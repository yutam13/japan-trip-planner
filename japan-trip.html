<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0b1020" />
<title>Japan 2026 — Trip Planner</title>
<style>
/* =========================================================================
   Reset & base
   ========================================================================= */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
               "Segoe UI", system-ui, "Helvetica Neue", Arial, sans-serif;
  font-size: 16px;
  line-height: 1.45;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior-y: none;
}
button { font: inherit; cursor: pointer; color: inherit; background: none; border: 0; padding: 0; }
input, textarea, select { font: inherit; color: inherit; }
input, textarea { font-size: 16px; }                 /* avoid iOS zoom on focus */
a { color: inherit; text-decoration: none; }
::selection { background: rgba(37, 99, 235, 0.18); }

/* =========================================================================
   Design tokens
   ========================================================================= */
:root {
  --bg: #f6f7fb;
  --bg-card: #ffffff;
  --text: #0b1220;
  --text-muted: #5b6477;
  --text-soft: #8a93a6;
  --border: #e7e9ef;
  --border-soft: #f1f3f7;

  --shadow-sm: 0 1px 2px rgba(15, 23, 42, .04);
  --shadow-md: 0 6px 18px -4px rgba(15, 23, 42, .12), 0 2px 4px rgba(15, 23, 42, .04);
  --shadow-lg: 0 18px 40px -10px rgba(15, 23, 42, .22), 0 4px 10px rgba(15, 23, 42, .06);

  --r-sm: 10px;
  --r-md: 14px;
  --r-lg: 20px;
  --r-xl: 26px;
  --r-pill: 999px;

  --pad-page: 16px;
  --pad-card: 18px;

  --orange: #f97316;
  --orange-2: #fb923c;
  --violet: #7c5cff;
  --violet-2: #a78bfa;
  --rose: #ef4444;
  --green: #10b981;

  /* Per-day theme — overridden by .theme-* */
  --c-bg: #475569;
  --c-bg-2: #94a3b8;
  --c-soft: #f1f5f9;
  --c-accent: #475569;
  --c-on: #ffffff;
}
.theme-tokyo  { --c-bg: #2563eb; --c-bg-2: #7aa2ff; --c-soft: #eff4ff; --c-accent: #2563eb; }
.theme-nagano { --c-bg: #059669; --c-bg-2: #34d399; --c-soft: #ecfdf5; --c-accent: #059669; }
.theme-kyoto  { --c-bg: #d22a2a; --c-bg-2: #f87171; --c-soft: #fff1f1; --c-accent: #d22a2a; }
.theme-fuji   { --c-bg: #ea580c; --c-bg-2: #fdba74; --c-soft: #fff5ec; --c-accent: #ea580c; }
.theme-flight { --c-bg: #334155; --c-bg-2: #64748b; --c-soft: #eef1f5; --c-accent: #334155; }

/* =========================================================================
   App shell
   ========================================================================= */
#root { min-height: 100vh; min-height: 100dvh; }
.app { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; }

/* Top bar (sticky, glassy) */
.topbar {
  position: sticky; top: 0; z-index: 30;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 18px;
  padding-top: calc(12px + env(safe-area-inset-top));
  background: rgba(255, 255, 255, 0.82);
  backdrop-filter: saturate(180%) blur(18px);
  -webkit-backdrop-filter: saturate(180%) blur(18px);
  border-bottom: 1px solid var(--border-soft);
}
.brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
.brand-mark {
  width: 40px; height: 40px; border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #ff7a8a 0%, #ef4444 65%, #b91c1c 100%);
  display: grid; place-items: center; color: white; font-size: 18px;
  box-shadow: 0 6px 16px -4px rgba(239, 68, 68, .55);
  flex: 0 0 auto;
}
.brand-text { display: flex; flex-direction: column; line-height: 1.15; min-width: 0; }
.brand-title { font-weight: 800; font-size: 17px; color: var(--text); letter-spacing: -.015em; }
.brand-sub { font-size: 12px; color: var(--text-soft); font-weight: 500; }

.btn-reset {
  font-size: 13px; font-weight: 700; color: var(--text);
  padding: 9px 14px; border-radius: var(--r-pill);
  background: var(--bg-card);
  border: 1px solid var(--border);
  transition: background .15s ease, transform .1s ease, box-shadow .15s ease;
}
.btn-reset:hover { background: #f8fafc; box-shadow: var(--shadow-sm); }
.btn-reset:active { transform: scale(.97); }

/* =========================================================================
   Day pills (horizontal scroller, primary navigation)
   ========================================================================= */
.pills-wrap {
  position: sticky; top: calc(64px + env(safe-area-inset-top)); z-index: 20;
  background: var(--bg);
  border-bottom: 1px solid var(--border-soft);
}
.pills {
  display: flex; gap: 12px;
  padding: 16px 16px 18px;
  overflow-x: auto;
  scroll-snap-type: x proximity;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.pills::-webkit-scrollbar { display: none; }
.pill {
  flex: 0 0 auto;
  width: 76px;
  height: 92px;
  scroll-snap-align: center;
  background: var(--bg-card);
  border: 1.5px solid #e6e8ef;
  border-radius: 18px;
  padding: 14px 8px 12px;
  text-align: center;
  position: relative;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  gap: 4px;
  transition: transform .18s ease, box-shadow .18s ease, background .18s ease, border-color .18s ease, color .18s ease;
  -webkit-user-select: none; user-select: none;
}
.pill:hover { box-shadow: var(--shadow-sm); border-color: #d6dae3; }
.pill:active { transform: scale(.97); }
.pill .num-label { font-size: 11px; letter-spacing: .04em; font-weight: 600; color: var(--text-muted); text-transform: lowercase; }
.pill .num-big { font-size: 30px; font-weight: 800; line-height: 1; letter-spacing: -.025em; color: var(--text); }
.pill .pill-meta { font-size: 10px; color: var(--text-soft); font-weight: 600; opacity: 0; height: 0; }
.pill .pill-check {
  position: absolute; top: 8px; right: 8px;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--green); color: white;
  font-size: 11px; font-weight: 800;
  display: none; align-items: center; justify-content: center;
  box-shadow: 0 2px 6px rgba(16, 185, 129, .4);
}
.pill.is-done .pill-check { display: flex; }

.pill.is-active {
  background: var(--c-bg);
  border-color: transparent;
  box-shadow: 0 14px 28px -10px rgba(0, 0, 0, .25), 0 6px 12px rgba(0, 0, 0, .08);
  transform: translateY(-1px) scale(1.02);
}
.pill.is-active .num-label { color: rgba(255, 255, 255, .85); }
.pill.is-active .num-big { color: white; }
.pill.is-active .pill-check { background: white; color: var(--c-bg); box-shadow: 0 2px 4px rgba(0,0,0,.15); }

/* =========================================================================
   Day overview card (clean white card, like the reference image)
   ========================================================================= */
.day-view { flex: 1; min-width: 0; }

.overview {
  margin: 18px 16px 0;
  background: var(--bg-card);
  border-radius: 22px;
  padding: 22px 22px 20px;
  box-shadow: var(--shadow-md);
  position: relative;
  overflow: hidden;
  animation: cardIn .35s ease both;
}
.overview::before {
  /* faint city-themed glow in the corner for richness */
  content: "";
  position: absolute; right: -60px; top: -60px;
  width: 220px; height: 220px; border-radius: 50%;
  background: radial-gradient(circle, var(--c-bg) 0%, transparent 65%);
  opacity: .08;
  pointer-events: none;
}
.overview .ov-row {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
}
.overview .ov-label {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 800; letter-spacing: .12em;
  color: var(--c-bg); text-transform: uppercase;
}
.overview .ov-cal {
  width: 36px; height: 36px; border-radius: 12px;
  background: var(--c-soft); color: var(--c-bg);
  display: grid; place-items: center; font-size: 16px;
  flex-shrink: 0;
}
.overview h2 {
  margin: 12px 0 6px;
  font-size: 26px; line-height: 1.15; font-weight: 800;
  letter-spacing: -.02em; color: var(--text);
}
.overview .ov-sub {
  margin: 0;
  font-size: 14.5px;
  color: var(--text-muted);
  line-height: 1.5;
}
.overview .ov-actions { margin-top: 16px; display: flex; gap: 8px; flex-wrap: wrap; }
.btn-done {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 11px 18px; border-radius: var(--r-pill);
  background: var(--text); color: white;
  font-size: 13px; font-weight: 700;
  box-shadow: 0 8px 18px -8px rgba(11, 18, 32, .55);
  transition: background .15s, transform .1s, filter .15s;
}
.btn-done:hover { filter: brightness(1.1); }
.btn-done:active { transform: scale(.97); }
.btn-done.is-done {
  background: linear-gradient(135deg, #10b981, #34d399);
  box-shadow: 0 8px 18px -8px rgba(16, 185, 129, .55);
}

@media (min-width: 720px) {
  .overview { margin: 24px 32px 0; padding: 28px 32px 26px; }
  .overview h2 { font-size: 32px; }
}

/* Day content area */
.content {
  max-width: 980px;
  margin: 0 auto;
  padding: 22px 16px calc(48px + env(safe-area-inset-bottom));
}
@media (min-width: 720px) {
  .content { padding: 28px 32px calc(56px + env(safe-area-inset-bottom)); }
}

/* Notes block (info-only days + weekly notes) */
.notes-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 20px;
  box-shadow: var(--shadow-sm);
}
.notes-card h3 { margin: 0 0 8px; font-size: 16px; font-weight: 700; }
.notes-card p { margin: 0; font-size: 14.5px; color: #2b3344; white-space: pre-line; }
.tip-card {
  background: #fffbeb;
  border: 1px solid #fde68a;
  border-radius: var(--r-md);
  padding: 14px 16px;
  margin-bottom: 18px;
}
.tip-card p { margin: 0; font-size: 14px; color: #6b4f00; white-space: pre-line; }

/* Section block */
.section { margin-top: 30px; }
.section:first-of-type { margin-top: 8px; }
.section-head {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; flex-wrap: wrap; margin-bottom: 14px;
  padding: 0 4px;
}
.section-head h3 {
  margin: 0; font-size: 20px; font-weight: 800; letter-spacing: -.015em;
  display: flex; align-items: center; gap: 10px;
  color: var(--text);
}
.section-head h3 .count {
  font-size: 12px; font-weight: 800;
  padding: 4px 10px; border-radius: var(--r-pill);
  background: var(--border-soft); color: var(--text-muted);
  letter-spacing: .02em;
}
.section.kind-attractions .section-head h3 .icon { color: var(--c-accent); }
.section.kind-restaurants .section-head h3 .icon { color: var(--orange); }
.section.kind-custom      .section-head h3 .icon { color: var(--violet); }

.btn-add {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: var(--r-pill);
  font-size: 13px; font-weight: 700;
  color: white;
  transition: transform .1s, box-shadow .15s, filter .15s;
  box-shadow: 0 6px 14px -6px rgba(0,0,0,.25);
}
.btn-add:hover { filter: brightness(1.05); }
.btn-add:active { transform: scale(.97); }
.btn-add.attr { background: linear-gradient(135deg, var(--c-bg), var(--c-bg-2)); }
.btn-add.rest { background: linear-gradient(135deg, #f97316, #fb923c); }
.btn-add.cust { background: linear-gradient(135deg, var(--violet), var(--violet-2)); }

.section-tools { display: flex; gap: 6px; }
.btn-icon {
  width: 32px; height: 32px; border-radius: 10px;
  background: var(--border-soft); color: var(--text-muted);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 14px; transition: background .15s, color .15s, transform .1s;
}
.btn-icon:hover { background: #e2e6ee; color: var(--text); }
.btn-icon:active { transform: scale(.94); }
.btn-icon.danger:hover { background: #ffe4e4; color: var(--rose); }

/* Cards grid */
.cards { display: grid; grid-template-columns: 1fr; gap: 12px; }
@media (min-width: 720px) { .cards { grid-template-columns: 1fr 1fr; gap: 14px; } }

/* Card */
@keyframes cardIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.card {
  position: relative;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 22px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: box-shadow .2s ease, transform .2s ease, border-color .2s ease;
  display: flex; flex-direction: column;
  animation: cardIn .35s ease both;
}
@media (min-width: 720px) {
  .card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
}
.card.is-visited { opacity: .65; }

/* Hero strip on each card (gradient + city emoji + category badge) */
.card-hero {
  position: relative;
  height: 96px;
  background: linear-gradient(135deg, var(--c-bg) 0%, var(--c-bg-2) 100%);
  display: flex; align-items: center; padding: 0 20px;
  overflow: hidden;
}
.card.kind-restaurant .card-hero { background: linear-gradient(135deg, #fb923c 0%, #fdba74 100%); }
.card.kind-custom .card-hero     { background: linear-gradient(135deg, var(--violet) 0%, var(--violet-2) 100%); }
.card-hero::after {
  content: "";
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 0% 0%, rgba(255,255,255,.22), transparent 50%),
    radial-gradient(circle at 100% 100%, rgba(0,0,0,.18), transparent 50%);
  pointer-events: none;
}
.card-hero .hero-emoji {
  position: relative; z-index: 1;
  font-size: 44px; line-height: 1;
  filter: drop-shadow(0 6px 8px rgba(0,0,0,.18));
}
.card-hero .hero-pattern {
  position: absolute; right: -22px; bottom: -32px;
  font-size: 130px; line-height: 1; opacity: .14;
  pointer-events: none;
}
.card-badge {
  position: absolute; top: 14px; right: 14px; z-index: 2;
  display: inline-flex; align-items: center; gap: 4px;
  padding: 5px 11px; border-radius: var(--r-pill);
  background: rgba(255,255,255,.96);
  color: var(--text);
  font-size: 11px; font-weight: 800; letter-spacing: .12em;
  box-shadow: 0 4px 8px -2px rgba(0,0,0,.12);
}

.card-body { padding: 16px 18px 18px; display: flex; flex-direction: column; gap: 10px; }
.card-name { margin: 0; font-size: 17px; font-weight: 800; letter-spacing: -.01em; line-height: 1.25; }
.card-desc { margin: 4px 0 0; font-size: 14px; color: var(--text-muted); line-height: 1.5; }
.tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
.tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: var(--r-pill);
  font-size: 11.5px; font-weight: 700; letter-spacing: .02em;
}
.tag-cuisine { background: #fff1e6; color: #9a3412; }
.tag-price   { background: #fde7f3; color: #9d174d; }
.tag-visited { background: #d1fae5; color: #065f46; }

.meta-line { font-size: 13.5px; color: #2b3344; line-height: 1.5; margin: 0; }
.meta-line .lab { font-weight: 700; color: var(--text-muted); margin-right: 4px; }

.card-footer {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  flex-wrap: wrap; margin-top: 4px;
}
.card-actions { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  font-size: 12.5px; font-weight: 700;
  padding: 7px 12px; border-radius: var(--r-pill);
  background: var(--border-soft); color: var(--text-muted);
  transition: background .15s, color .15s, transform .1s;
}
.chip:hover { background: #e6eaf2; color: var(--text); }
.chip:active { transform: scale(.96); }
.chip.is-on { background: #d1fae5; color: #065f46; }
.chip.danger { background: #fff0f0; color: #b91c1c; }
.chip.danger:hover { background: #ffe1e1; }

/* Map / Navigate button */
.map-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  min-height: 44px; padding: 0 18px; border-radius: var(--r-pill);
  background: var(--text);
  color: white; font-size: 13px; font-weight: 700;
  letter-spacing: .01em; white-space: nowrap;
  box-shadow: 0 8px 18px -8px rgba(11, 18, 32, .55), 0 2px 4px rgba(0,0,0,.08);
  transition: transform .1s ease, filter .15s ease, box-shadow .15s ease;
}
.map-btn:hover { filter: brightness(1.18); box-shadow: 0 10px 22px -8px rgba(11, 18, 32, .6); }
.map-btn:active { transform: scale(.96); }
.map-btn .pin { font-size: 14px; }

/* Forms */
.form-block {
  background: linear-gradient(180deg, #fafbff, #f5f7fc);
  border: 1px dashed #c8cfdd;
  border-radius: var(--r-md);
  padding: 14px;
  margin-bottom: 12px;
  animation: cardIn .25s ease both;
}
.form-block h4 { margin: 0 0 10px; font-size: 13.5px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .08em; }
.form-grid { display: grid; gap: 8px; }
.input, .textarea {
  width: 100%; display: block;
  padding: 10px 12px; border: 1px solid var(--border);
  border-radius: 10px; background: white;
  transition: border-color .15s, box-shadow .15s;
}
.input:focus, .textarea:focus {
  outline: none; border-color: var(--c-accent);
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--c-accent) 18%, transparent);
}
.textarea { min-height: 60px; resize: vertical; line-height: 1.4; }
.form-actions { display: flex; gap: 8px; margin-top: 10px; }
.btn-primary {
  padding: 10px 16px; border-radius: var(--r-pill);
  background: linear-gradient(135deg, #0b1220, #1f2a3d);
  color: white; font-size: 14px; font-weight: 700;
  box-shadow: 0 8px 16px -6px rgba(0,0,0,.4);
  transition: transform .1s, filter .15s;
}
.btn-primary:hover { filter: brightness(1.08); }
.btn-primary:active { transform: scale(.97); }
.btn-secondary {
  padding: 10px 16px; border-radius: var(--r-pill);
  background: var(--border-soft); color: var(--text);
  font-size: 14px; font-weight: 600;
  transition: background .15s;
}
.btn-secondary:hover { background: #e2e6ee; }

/* Rename inline form */
.rename-form { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; flex: 1; min-width: 0; }
.rename-form .input { padding: 6px 10px; }

/* Footer with "+ New section" */
.footer-tools {
  margin-top: 22px; padding-top: 18px;
  border-top: 1px dashed var(--border);
}
.btn-newsection {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 16px; border-radius: var(--r-pill);
  background: linear-gradient(135deg, var(--violet), var(--violet-2));
  color: white; font-size: 13px; font-weight: 700;
  box-shadow: 0 8px 18px -8px rgba(124, 92, 255, .55);
  transition: transform .1s, filter .15s;
}
.btn-newsection:hover { filter: brightness(1.06); }
.btn-newsection:active { transform: scale(.97); }
.footer-help { margin: 10px 2px 0; font-size: 12px; color: var(--text-soft); }

/* Empty state */
.empty {
  font-size: 14px; color: var(--text-soft); font-style: italic;
  padding: 6px 4px;
}

/* Edit form inside card */
.card .form-block { margin-bottom: 0; background: #f9fafe; border: 1px solid var(--border); border-style: solid; }

/* "Add Place" button uses theme-aware color */
.section.kind-attractions .btn-add { /* already set above */ }

/* Better tap states on iOS for pills */
@media (hover: none) {
  .pill { transition-duration: .12s; }
  .pill:hover { transform: none; box-shadow: none; }
  .pill:active { transform: scale(.97); }
}
</style>
</head>
<body>
<div id="root"></div>

<script>
(function () {
  "use strict";

  /* =========================================================================
     Constants
     ========================================================================= */
  var STORAGE_KEY = "japan-trip-2026";
  var SELECTED_DAY_KEY = "japan-trip-2026:selectedDay";

  var cityIcon = { Tokyo: "🗼", Nagano: "🏔️", Kyoto: "🏯", Fuji: "🗻", Flight: "✈️" };
  var cityClass = { Tokyo: "theme-tokyo", Nagano: "theme-nagano", Kyoto: "theme-kyoto", Fuji: "theme-fuji", Flight: "theme-flight" };

  /* =========================================================================
     Default itinerary (extracted from Plan_v5.docx daily section, May 13–31)
     ========================================================================= */
  var defaultData = [
    {
      id: "2026-05-13", date: "May 13", weekday: "Wednesday", city: "Flight",
      title: "Flight to Japan", done: false, infoOnly: true,
      notes: "LY91 TLV (T3) → Tokyo Narita. Depart 19:15 (May 13) · Arrive 13:20 (May 14). Overnight flight — eat early at the airport, sleep on board.\n\nPre-trip checklist:\n• Pre-load Suica/PASMO on Apple Wallet before departure (saves time at NRT).\n• Download offline Google Maps for Tokyo, Nagano, Kyoto, Kawaguchiko.\n• Confirm Imperial Palace tour, teamLab tickets, and all kaiseki reservations.",
      attractions: [], restaurants: []
    },
    {
      id: "2026-05-14", date: "May 14", weekday: "Thursday", city: "Tokyo",

  /* =========================================================================
     Helpers: id, escape, maps URL
     ========================================================================= */
  function newId() {
    if (typeof crypto !== "undefined" && crypto.randomUUID) return crypto.randomUUID();
    return "id-" + Math.random().toString(36).slice(2) + Date.now().toString(36);
  }

  function esc(s) {
    if (s == null) return "";
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function autoMapsUrl(name, city) {
    var cityName = city === "Fuji" ? "Kawaguchiko" : city === "Flight" ? "Japan" : city;
    return "https://maps.google.com/?q=" + encodeURIComponent(name + " Japan " + cityName);
  }
  function getMapsHref(item, city) {
    var u = (item && item.mapsUrl) ? String(item.mapsUrl).trim() : "";
    if (!u) return autoMapsUrl(item.name, city);
    if (/^https?:\/\//i.test(u)) return u;
    if (/^www\./i.test(u)) return "https://" + u;
    return "https://maps.google.com/?q=" + encodeURIComponent(u);
  }

  /* =========================================================================
     Storage
     ========================================================================= */
  function loadStored() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return { days: clone(defaultData), customSections: [] };
      var parsed = JSON.parse(raw);
      if (Array.isArray(parsed) && parsed.length > 0) return { days: parsed, customSections: [] };
      if (parsed && Array.isArray(parsed.days) && parsed.days.length > 0) {
        return {
          days: parsed.days,
          customSections: Array.isArray(parsed.customSections) ? parsed.customSections : []
        };
      }
    } catch (e) {}
    return { days: clone(defaultData), customSections: [] };
  }
  function clone(v) { return JSON.parse(JSON.stringify(v)); }

  /* =========================================================================
     State
     ========================================================================= */
  var state = (function () {
    var s = loadStored();
    return {
      days: s.days,
      customSections: s.customSections,
      selectedDayId: localStorage.getItem(SELECTED_DAY_KEY) || s.days[0].id,
      editing: null,         // item id currently in edit mode
      adding: null,          // section key for add form: "attractions" | "restaurants" | section id
      renamingSection: null  // section id being renamed
    };
  })();

  function persist() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ days: state.days, customSections: state.customSections }));
      localStorage.setItem(SELECTED_DAY_KEY, state.selectedDayId);
    } catch (e) {}
  }

  function getSelectedDay() {
    var i = state.days.findIndex(function (d) { return d.id === state.selectedDayId; });
    return i >= 0 ? state.days[i] : state.days[0];
  }
  function getSelectedDayIndex() {
    var i = state.days.findIndex(function (d) { return d.id === state.selectedDayId; });
    return i >= 0 ? i : 0;
  }

  function updateSelectedDay(mutator) {
    var idx = getSelectedDayIndex();
    var copy = JSON.parse(JSON.stringify(state.days[idx]));
    mutator(copy);
    state.days[idx] = copy;
    persist();
    render();
  }

  /* =========================================================================
     Templates / render
     ========================================================================= */
  function html(strings) {
    // Simple tagged-template helper that returns the joined string.
    // (We rely on caller to esc() user-supplied parts.)
    var out = strings[0];
    for (var i = 1; i < arguments.length; i++) out += arguments[i] + strings[i];
    return out;
  }

  function renderPills() {
    var parts = state.days.map(function (d, i) {
      var icon = cityIcon[d.city] || "•";
      var theme = cityClass[d.city] || "";
      var active = d.id === state.selectedDayId;
      return (
        '<button class="pill ' + theme + (active ? " is-active" : "") + (d.done ? " is-done" : "") +
        '" data-action="select-day" data-day-id="' + esc(d.id) + '" aria-label="Day ' + (i + 1) + ' — ' + esc(d.date) + ' ' + esc(d.city) + (d.done ? ", done" : "") + '">' +
          '<div class="num-label">Day</div>' +
          '<div class="num-big">' + (i + 1) + '</div>' +
          '<div class="pill-meta"><span class="icon">' + icon + '</span><span>' + esc(d.date.replace(/^May\s*/, "")) + '</span></div>' +
          '<span class="pill-check" aria-hidden="true">✓</span>' +
        '</button>'
      );
    }).join("");
    return '<div class="pills" id="pills">' + parts + '</div>';
  }

  function renderHero(day, index) {
    var theme = cityClass[day.city] || "theme-flight";
    var doneOn = day.done ? "is-done" : "";
    var doneLabel = day.done ? "✓ Day done" : "Mark day done";
    var cityLine = day.city === "Flight" ? "In transit" : esc(day.city);
    var monthLabel = day.date.replace(/(\w+) (\d+)/, "$1") .toUpperCase();   // "MAY"
    var dayNum = (day.date.match(/\d+/) || [""])[0];
    var label = monthLabel + " · " + esc((day.city || "").toUpperCase()) + " " + dayNum;
    return (
      '<section class="overview ' + theme + '">' +
        '<div class="ov-row">' +
          '<div>' +
            '<div class="ov-label">' + label + '</div>' +
            '<h2>' + esc(day.title) + '</h2>' +
            '<p class="ov-sub">Day ' + (index + 1) + ' of ' + state.days.length + ' · ' + esc(day.weekday) + ' · ' + cityLine + '</p>' +
          '</div>' +
          '<div class="ov-cal" aria-hidden="true">📅</div>' +
        '</div>' +
        '<div class="ov-actions">' +
          '<button class="btn-done ' + doneOn + '" data-action="toggle-done">' + doneLabel + '</button>' +
        '</div>' +
      '</section>'
    );
  }

          '<input class="input" name="name" placeholder="Name" required value="' + esc(item.name || "") + '">' +

          '<textarea class="textarea" name="tip" placeholder="Tip (optional)">' + esc(item.tip || "") + '</textarea>' +

          '<textarea class="textarea" name="note" placeholder="Note (optional)">' + esc(item.note || "") + '</textarea>' +

  function cardHeroBlock(emoji, badgeLabel) {
    return (
      '<div class="card-hero">' +
        '<span class="hero-emoji" aria-hidden="true">' + emoji + '</span>' +

        '<span class="card-badge">' + badgeLabel + '</span>' +
      '</div>'
    );

  function renderAttractionCard(item, day) {
    if (state.editing === item.id) return '<div class="card kind-attraction" style="overflow:visible">' + renderAttractionEditor(item, false) + '</div>';
    var visitedClass = item.visited ? " is-visited" : "";
    var theme = cityClass[day.city] || "theme-flight";
    var icon = cityIcon[day.city] || "📍";
    var visitedChip = item.visited
      ? '<button class="chip is-on" data-action="toggle-visited" data-id="' + esc(item.id) + '">✓ Visited</button>'
      : '<button class="chip" data-action="toggle-visited" data-id="' + esc(item.id) + '">Mark visited</button>';
    return (
      '<article class="card kind-attraction ' + theme + visitedClass + '">' +
        cardHeroBlock(icon, "PLACE") +
        '<div class="card-body">' +
          '<h4 class="card-name">' + esc(item.name) + '</h4>' +
          (item.description ? '<p class="card-desc">' + esc(item.description) + '</p>' : '') +
          (item.hours ? '<p class="meta-line"><span class="lab">⏰ Hours</span>' + esc(item.hours) + '</p>' : '') +
          (item.tip ? '<p class="meta-line"><span class="lab">💡 Tip</span>' + esc(item.tip) + '</p>' : '') +
          '<div class="card-footer">' +
            '<a class="map-btn" target="_blank" rel="noopener noreferrer" href="' + esc(getMapsHref(item, day.city)) + '" aria-label="Open ' + esc(item.name) + ' in Google Maps"><span class="pin">📍</span> Navigate</a>' +
            '<div class="card-actions">' +
              visitedChip +
              '<button class="chip" data-action="edit" data-id="' + esc(item.id) + '">✏️</button>' +
              '<button class="chip danger" data-action="delete-attraction" data-id="' + esc(item.id) + '" data-name="' + esc(item.name) + '">🗑️</button>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</article>'
    );
  }

  function renderRestaurantCard(item, day) {
    if (state.editing === item.id) return '<div class="card kind-restaurant" style="overflow:visible">' + renderRestaurantEditor(item, false) + '</div>';
    var visitedClass = item.visited ? " is-visited" : "";
    var theme = cityClass[day.city] || "theme-flight";
    var visitedChip = item.visited
      ? '<button class="chip is-on" data-action="toggle-visited-r" data-id="' + esc(item.id) + '">✓ Visited</button>'
      : '<button class="chip" data-action="toggle-visited-r" data-id="' + esc(item.id) + '">Mark visited</button>';
    var tags = '';
    if (item.cuisine) tags += '<span class="tag tag-cuisine">🍴 ' + esc(item.cuisine) + '</span>';
    if (item.price) tags += '<span class="tag tag-price">💴 ' + esc(item.price) + '</span>';
    return (
      '<article class="card kind-restaurant ' + theme + visitedClass + '">' +
        cardHeroBlock("🍱", "FOOD") +
        '<div class="card-body">' +
          '<h4 class="card-name">' + esc(item.name) + '</h4>' +
          (tags ? '<div class="tag-row">' + tags + '</div>' : '') +
          (item.note ? '<p class="meta-line">📝 ' + esc(item.note) + '</p>' : '') +
          '<div class="card-footer">' +
            '<a class="map-btn" target="_blank" rel="noopener noreferrer" href="' + esc(getMapsHref(item, day.city)) + '" aria-label="Open ' + esc(item.name) + ' in Google Maps"><span class="pin">📍</span> Navigate</a>' +
            '<div class="card-actions">' +
              visitedChip +
              '<button class="chip" data-action="edit-r" data-id="' + esc(item.id) + '">✏️</button>' +
              '<button class="chip danger" data-action="delete-restaurant" data-id="' + esc(item.id) + '" data-name="' + esc(item.name) + '">🗑️</button>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</article>'
    );
  }

  function renderGenericCard(item, day, sectionId, sectionLabel) {
    if (state.editing === item.id) return '<div class="card kind-custom" style="overflow:visible">' + renderGenericEditor(item, false, sectionId, sectionLabel) + '</div>';
    var visitedClass = item.visited ? " is-visited" : "";
    var theme = cityClass[day.city] || "theme-flight";
    var visitedChip = item.visited
      ? '<button class="chip is-on" data-action="toggle-visited-c" data-id="' + esc(item.id) + '" data-section-id="' + esc(sectionId) + '">✓ Visited</button>'
      : '<button class="chip" data-action="toggle-visited-c" data-id="' + esc(item.id) + '" data-section-id="' + esc(sectionId) + '">Mark visited</button>';
    var badge = sectionLabel ? sectionLabel.toUpperCase().slice(0, 12) : "ITEM";
    return (
      '<article class="card kind-custom ' + theme + visitedClass + '">' +
        cardHeroBlock("✨", esc(badge)) +
        '<div class="card-body">' +
          '<h4 class="card-name">' + esc(item.name) + '</h4>' +
          (item.description ? '<p class="card-desc">' + esc(item.description) + '</p>' : '') +
          (item.note ? '<p class="meta-line">📝 ' + esc(item.note) + '</p>' : '') +
          '<div class="card-footer">' +
            '<a class="map-btn" target="_blank" rel="noopener noreferrer" href="' + esc(getMapsHref(item, day.city)) + '" aria-label="Open ' + esc(item.name) + ' in Google Maps"><span class="pin">📍</span> Navigate</a>' +
            '<div class="card-actions">' +
              visitedChip +
              '<button class="chip" data-action="edit-c" data-id="' + esc(item.id) + '" data-section-id="' + esc(sectionId) + '">✏️</button>' +
              '<button class="chip danger" data-action="delete-custom" data-id="' + esc(item.id) + '" data-section-id="' + esc(sectionId) + '" data-name="' + esc(item.name) + '">🗑️</button>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</article>'
    );
  }

  function renderAttractionsSection(day) {
    var addOpen = state.adding === "attractions";
    var emptyMsg = (day.attractions.length === 0 && !addOpen)
      ? '<p class="empty">No attractions yet — tap "+ Add Place" to add one.</p>'
      : '';
    return (
      '<section class="section kind-attractions">' +
        '<div class="section-head">' +
          '<h3><span class="icon">🗺️</span> Attractions <span class="count">' + day.attractions.length + '</span></h3>' +
          '<button class="btn-add attr" data-action="add-attraction">+ Add Place</button>' +
        '</div>' +
        (addOpen ? renderAttractionEditor({ id: newId() }, true) : '') +
        '<div class="cards">' +
          day.attractions.map(function (a) { return renderAttractionCard(a, day); }).join("") +
        '</div>' +
        emptyMsg +
      '</section>'
    );
  }

  function renderRestaurantsSection(day) {
    var addOpen = state.adding === "restaurants";
    var emptyMsg = (day.restaurants.length === 0 && !addOpen)
      ? '<p class="empty">No restaurants yet — tap "+ Add Restaurant" to add one.</p>'
      : '';
    return (
      '<section class="section kind-restaurants">' +
        '<div class="section-head">' +
          '<h3><span class="icon">🍱</span> Restaurants <span class="count">' + day.restaurants.length + '</span></h3>' +
          '<button class="btn-add rest" data-action="add-restaurant">+ Add Restaurant</button>' +
        '</div>' +
        (addOpen ? renderRestaurantEditor({ id: newId() }, true) : '') +
        '<div class="cards">' +
          day.restaurants.map(function (r) { return renderRestaurantCard(r, day); }).join("") +
        '</div>' +
        emptyMsg +
      '</section>'
    );
  }

  function renderCustomSection(section, day) {
    var items = (day.customItems && day.customItems[section.id]) || [];
    var addOpen = state.adding === section.id;
    var renaming = state.renamingSection === section.id;
    var head = renaming
      ? ('<form class="rename-form" data-form="rename-section" data-section-id="' + esc(section.id) + '">' +
            '<input class="input" name="label" required value="' + esc(section.label) + '" placeholder="Section name">' +
            '<button type="submit" class="btn-primary">Save</button>' +
            '<button type="button" class="btn-secondary" data-action="cancel-rename">Cancel</button>' +
         '</form>')
      : ('<h3><span class="icon">✨</span> ' + esc(section.label) + ' <span class="count">' + items.length + '</span></h3>');
    var tools = renaming ? '' :
      '<div class="section-tools">' +
        '<button class="btn-add cust" data-action="add-custom" data-section-id="' + esc(section.id) + '" data-section-label="' + esc(section.label) + '">+ Add</button>' +
        '<button class="btn-icon" data-action="rename-section" data-section-id="' + esc(section.id) + '" title="Rename section">✏️</button>' +
        '<button class="btn-icon danger" data-action="delete-section" data-section-id="' + esc(section.id) + '" data-section-label="' + esc(section.label) + '" title="Delete section">🗑️</button>' +
      '</div>';
    var emptyMsg = (items.length === 0 && !addOpen && !renaming)
      ? '<p class="empty">Nothing here yet — tap "+ Add" to add to ' + esc(section.label) + '.</p>'
      : '';
    return (
      '<section class="section kind-custom">' +
        '<div class="section-head">' + head + tools + '</div>' +
        (addOpen ? renderGenericEditor({ id: newId() }, true, section.id, section.label) : '') +
        '<div class="cards">' +
          items.map(function (it) { return renderGenericCard(it, day, section.id, section.label); }).join("") +
        '</div>' +
        emptyMsg +
      '</section>'
    );
  }

  function renderNewSectionForm() {
    if (state.adding === "__new_section__") {
      return (
        '<form class="form-block" data-form="new-section" autocomplete="off" style="margin-top:14px;">' +
          '<h4>New section</h4>' +
          '<div class="form-grid">' +
            '<input class="input" name="label" required placeholder="Section name (e.g. Bars, Onsens, Shopping)" autofocus>' +
          '</div>' +
          '<div class="form-actions">' +
            '<button type="submit" class="btn-primary">Create section</button>' +
            '<button type="button" class="btn-secondary" data-action="cancel-form">Cancel</button>' +
          '</div>' +
        '</form>'
      );
    }
    return (
      '<div class="footer-tools">' +
        '<button class="btn-newsection" data-action="open-new-section">+ New section (e.g. Bars)</button>' +
        '<p class="footer-help">New sections appear on every day, so you can fill in items per-day.</p>' +
      '</div>'
    );
  }

  function renderDayContent(day) {
    if (day.infoOnly) {
      return (
        '<div class="content">' +
          '<div class="notes-card">' +
            '<h3>Flight & pre-trip notes</h3>' +
            '<p>' + esc(day.notes) + '</p>' +
          '</div>' +
        '</div>'
      );
    }
    var noteBlock = day.notes ? ('<div class="tip-card"><p>' + esc(day.notes) + '</p></div>') : '';
    return (
      '<div class="content">' +
        noteBlock +
        renderAttractionsSection(day) +
        renderRestaurantsSection(day) +
        state.customSections.map(function (sec) { return renderCustomSection(sec, day); }).join("") +
        renderNewSectionForm() +
      '</div>'
    );
  }

  function render() {
    var day = getSelectedDay();
    var index = getSelectedDayIndex();
    var html =
      '<div class="app">' +
        '<header class="topbar">' +
          '<div class="brand">' +
            '<div class="brand-mark" aria-hidden="true">🗾</div>' +
            '<div class="brand-text">' +
              '<div class="brand-title">Japan 2026</div>' +
              '<div class="brand-sub">13 May → 31 May</div>' +
            '</div>' +
          '</div>' +
          '<button class="btn-reset" data-action="reset">Reset</button>' +
        '</header>' +
        '<div class="pills-wrap">' + renderPills() + '</div>' +
        '<main class="day-view">' +
          renderHero(day, index) +
          renderDayContent(day) +
        '</main>' +
      '</div>';
    document.getElementById("root").innerHTML = html;

    // Scroll the active pill into view
    var activePill = document.querySelector(".pill.is-active");
    if (activePill) {
      activePill.scrollIntoView({ block: "nearest", inline: "center", behavior: "smooth" });
    }
  }

  /* =========================================================================
     Event handling (delegated)
     ========================================================================= */
  document.addEventListener("click", function (e) {
    var t = e.target.closest("[data-action]");
    if (!t) return;
    var action = t.dataset.action;

    if (action === "select-day") {
      state.selectedDayId = t.dataset.dayId;
      state.adding = null; state.editing = null; state.renamingSection = null;
      persist();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
      return;
    }

    if (action === "reset") {
      if (confirm("Reset all edits and reload the original itinerary? This will erase any places you added or changed, and remove any custom sections.")) {
        state.days = JSON.parse(JSON.stringify(defaultData));
        state.customSections = [];
        state.selectedDayId = state.days[0].id;
        state.adding = null; state.editing = null; state.renamingSection = null;
        persist(); render();
      }
      return;
    }

    if (action === "toggle-done") {
      updateSelectedDay(function (d) { d.done = !d.done; });
      return;
    }

    /* Attractions */
    if (action === "add-attraction") { state.adding = "attractions"; state.editing = null; render(); return; }
    if (action === "edit") { state.editing = t.dataset.id; state.adding = null; render(); return; }
    if (action === "toggle-visited") {
      var id = t.dataset.id;
      updateSelectedDay(function (d) { d.attractions = d.attractions.map(function (a) { return a.id === id ? Object.assign({}, a, { visited: !a.visited }) : a; }); });
      return;
    }
    if (action === "delete-attraction") {
      var aid = t.dataset.id;
      if (confirm('Delete "' + t.dataset.name + '"?')) {
        updateSelectedDay(function (d) { d.attractions = d.attractions.filter(function (a) { return a.id !== aid; }); });
      }
      return;
    }

    /* Restaurants */
    if (action === "add-restaurant") { state.adding = "restaurants"; state.editing = null; render(); return; }
    if (action === "edit-r") { state.editing = t.dataset.id; state.adding = null; render(); return; }
    if (action === "toggle-visited-r") {
      var rid = t.dataset.id;
      updateSelectedDay(function (d) { d.restaurants = d.restaurants.map(function (x) { return x.id === rid ? Object.assign({}, x, { visited: !x.visited }) : x; }); });
      return;
    }
    if (action === "delete-restaurant") {
      var rid2 = t.dataset.id;
      if (confirm('Delete "' + t.dataset.name + '"?')) {
        updateSelectedDay(function (d) { d.restaurants = d.restaurants.filter(function (x) { return x.id !== rid2; }); });
      }
      return;
    }

    /* Custom sections */
    if (action === "open-new-section") { state.adding = "__new_section__"; state.editing = null; render(); return; }
    if (action === "rename-section") { state.renamingSection = t.dataset.sectionId; render(); return; }
    if (action === "cancel-rename") { state.renamingSection = null; render(); return; }
    if (action === "delete-section") {
      var sid = t.dataset.sectionId;
      if (confirm('Delete the "' + t.dataset.sectionLabel + '" section from every day? Items in it on every day will be lost.')) {
        state.customSections = state.customSections.filter(function (s) { return s.id !== sid; });
        state.days = state.days.map(function (d) {
          if (d.customItems && d.customItems[sid]) {
            var copy = Object.assign({}, d, { customItems: Object.assign({}, d.customItems) });
            delete copy.customItems[sid];
            return copy;
          }
          return d;
        });
        persist(); render();
      }
      return;
    }
    if (action === "add-custom") { state.adding = t.dataset.sectionId; state.editing = null; render(); return; }
    if (action === "edit-c") { state.editing = t.dataset.id; state.adding = null; render(); return; }
    if (action === "toggle-visited-c") {
      var cid = t.dataset.id, csid = t.dataset.sectionId;
      updateSelectedDay(function (d) {
        d.customItems = d.customItems || {};
        var arr = (d.customItems[csid] || []).map(function (x) { return x.id === cid ? Object.assign({}, x, { visited: !x.visited }) : x; });
        d.customItems[csid] = arr;
      });
      return;
    }
    if (action === "delete-custom") {
      var cid2 = t.dataset.id, csid2 = t.dataset.sectionId;
      if (confirm('Delete "' + t.dataset.name + '"?')) {
        updateSelectedDay(function (d) {
          if (!d.customItems || !d.customItems[csid2]) return;
          d.customItems[csid2] = d.customItems[csid2].filter(function (x) { return x.id !== cid2; });
        });
      }
      return;
    }

    if (action === "cancel-form") {
      state.adding = null; state.editing = null; render();
      return;
    }
  });

  document.addEventListener("submit", function (e) {
    var form = e.target.closest("form[data-form]");
    if (!form) return;
    e.preventDefault();
    var kind = form.dataset.form;
    var data = {};
    var inputs = form.querySelectorAll("input, textarea");
    for (var i = 0; i < inputs.length; i++) data[inputs[i].name] = inputs[i].value.trim();

    if (kind === "attraction") {
      if (!data.name) return;
      var isNew = form.dataset.new === "1";
      var id = form.dataset.id;
      updateSelectedDay(function (d) {
        if (isNew) d.attractions.push({ id: id, name: data.name, description: data.description, hours: data.hours, tip: data.tip, mapsUrl: data.mapsUrl, visited: false });
        else d.attractions = d.attractions.map(function (a) { return a.id === id ? Object.assign({}, a, { name: data.name, description: data.description, hours: data.hours, tip: data.tip, mapsUrl: data.mapsUrl }) : a; });
      });
      state.adding = null; state.editing = null; render();
      return;
    }
    if (kind === "restaurant") {
      if (!data.name) return;
      var isNew2 = form.dataset.new === "1";
      var id2 = form.dataset.id;
      updateSelectedDay(function (d) {
        if (isNew2) d.restaurants.push({ id: id2, name: data.name, cuisine: data.cuisine, price: data.price, note: data.note, mapsUrl: data.mapsUrl, visited: false });
        else d.restaurants = d.restaurants.map(function (x) { return x.id === id2 ? Object.assign({}, x, { name: data.name, cuisine: data.cuisine, price: data.price, note: data.note, mapsUrl: data.mapsUrl }) : x; });
      });
      state.adding = null; state.editing = null; render();
      return;
    }
    if (kind === "custom") {
      if (!data.name) return;
      var isNew3 = form.dataset.new === "1";
      var id3 = form.dataset.id;
      var sid = form.dataset.sectionId;
      updateSelectedDay(function (d) {
        d.customItems = d.customItems || {};
        var arr = d.customItems[sid] || [];
        if (isNew3) arr = arr.concat([{ id: id3, name: data.name, description: data.description, note: data.note, mapsUrl: data.mapsUrl, visited: false }]);
        else arr = arr.map(function (x) { return x.id === id3 ? Object.assign({}, x, { name: data.name, description: data.description, note: data.note, mapsUrl: data.mapsUrl }) : x; });
        d.customItems[sid] = arr;
      });
      state.adding = null; state.editing = null; render();
      return;
    }
    if (kind === "new-section") {
      if (!data.label) return;
      state.customSections = state.customSections.concat([{ id: newId(), label: data.label }]);
      state.adding = null; persist(); render();
      return;
    }
    if (kind === "rename-section") {
      if (!data.label) return;
      var rsid = form.dataset.sectionId;
      state.customSections = state.customSections.map(function (s) { return s.id === rsid ? Object.assign({}, s, { label: data.label }) : s; });
      state.renamingSection = null; persist(); render();
      return;
    }
  });

  /* =========================================================================
     Init
     ========================================================================= */
  render();
})();
</script>
</body>
</html>
