<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0b1020" />
<title>Japan 2026 — Trip Planner</title>
<script>
/* Apply the saved colour scheme before first paint — no flash. Light by default;
   only "dark" is dark (migrates any old "system" value to light). */
(function () {
  try {
    var t = localStorage.getItem("trip-theme-mode") === "dark" ? "dark" : "light";
    document.documentElement.setAttribute("data-theme", t);
  } catch (e) {}
})();
</script>
<style>
/* =========================================================================
   Reset & base
   ========================================================================= */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
               "Segoe UI", system-ui, "Helvetica Neue", Arial, sans-serif;
  font-size: 16px;
  line-height: 1.45;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior-y: none;
}
button { font: inherit; cursor: pointer; color: inherit; background: none; border: 0; padding: 0; }
/* Remove the double-tap-zoom delay on all controls for a native touch feel. */
button, a, .pill, .chip, .sec-tab, .jump-item, label[for] { touch-action: manipulation; }
input, textarea, select { font: inherit; color: inherit; }
input, textarea { font-size: 16px; }                 /* avoid iOS zoom on focus */
a { color: inherit; text-decoration: none; }
::selection { background: rgba(37, 99, 235, 0.18); }

/* =========================================================================
   Design tokens
   ========================================================================= */
:root {
  --bg: #f6f7fb;
  --bg-card: #ffffff;
  --text: #0b1220;
  --text-muted: #5b6477;
  --text-soft: #8a93a6;
  --border: #e7e9ef;
  --border-soft: #f1f3f7;
  --input-bg: #ffffff;
  --field-bg: linear-gradient(180deg, #fafbff, #f5f7fc);
  /* Solid "ink" button (dark in light mode, light in dark mode) so primary
     buttons keep contrast in both themes. */
  --ink: #0b1220;
  --ink-on: #ffffff;
  --meta-strong: #2b3344;

  --shadow-sm: 0 1px 2px rgba(15, 23, 42, .04);
  --shadow-md: 0 6px 18px -4px rgba(15, 23, 42, .12), 0 2px 4px rgba(15, 23, 42, .04);
  --shadow-lg: 0 18px 40px -10px rgba(15, 23, 42, .22), 0 4px 10px rgba(15, 23, 42, .06);

  --r-sm: 10px;
  --r-md: 14px;
  --r-lg: 20px;
  --r-xl: 26px;
  --r-pill: 999px;

  --pad-page: 16px;
  --pad-card: 18px;

  --orange: #f97316;
  --orange-2: #fb923c;
  --violet: #7c5cff;
  --violet-2: #a78bfa;
  --rose: #ef4444;
  --green: #10b981;

  /* Per-day theme — overridden by .theme-* */
  --c-bg: #475569;
  --c-bg-2: #94a3b8;
  --c-soft: #f1f5f9;
  --c-accent: #475569;
  --c-on: #ffffff;
}
.theme-tokyo  { --c-bg: #2563eb; --c-bg-2: #7aa2ff; --c-soft: #eff4ff; --c-accent: #2563eb; }
.theme-nagano { --c-bg: #059669; --c-bg-2: #34d399; --c-soft: #ecfdf5; --c-accent: #059669; }
.theme-kyoto  { --c-bg: #d22a2a; --c-bg-2: #f87171; --c-soft: #fff1f1; --c-accent: #d22a2a; }
.theme-fuji   { --c-bg: #ea580c; --c-bg-2: #fdba74; --c-soft: #fff5ec; --c-accent: #ea580c; }
.theme-flight { --c-bg: #334155; --c-bg-2: #64748b; --c-soft: #eef1f5; --c-accent: #334155; }
/* Locations get a distinct teal/cyan theme so they read as a different mode */
.theme-loc    { --c-bg: #0d9488; --c-bg-2: #5eead4; --c-soft: #effaf6; --c-accent: #0d9488; }

/* =========================================================================
   DARK MODE  —  toggled from Settings (sets <html data-theme="dark">).
   Overrides the neutral tokens + the few hardcoded surfaces. Accent colours
   and the city/cover gradients are kept (they read well on dark).
   ========================================================================= */
html[data-theme="dark"] {
  --bg: #0b1020;
  --bg-card: #161c2e;
  --text: #e9ebf2;
  --text-muted: #aab2c8;
  --text-soft: #79829a;
  --border: #283050;
  --border-soft: #1d2440;
  --input-bg: #0f1426;
  --field-bg: #0f1426;
  --ink: #e9ebf2;
  --ink-on: #0b1020;
  --meta-strong: #c8cee0;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, .45);
  --shadow-md: 0 6px 18px -4px rgba(0, 0, 0, .6), 0 2px 4px rgba(0, 0, 0, .4);
  --shadow-lg: 0 18px 40px -10px rgba(0, 0, 0, .75), 0 4px 10px rgba(0, 0, 0, .5);
  color-scheme: dark;
}
/* dark-tinted versions of the per-theme soft surfaces */
html[data-theme="dark"] .theme-tokyo  { --c-soft: #17233f; }
html[data-theme="dark"] .theme-nagano { --c-soft: #0f2a22; }
html[data-theme="dark"] .theme-kyoto  { --c-soft: #311920; }
html[data-theme="dark"] .theme-fuji   { --c-soft: #2e1d12; }
html[data-theme="dark"] .theme-flight { --c-soft: #1b2236; }
html[data-theme="dark"] .theme-loc    { --c-soft: #0e2420; }
html[data-theme="dark"] body { background: var(--bg); }
/* hardcoded text colours → dark-friendly */
html[data-theme="dark"] .meta-line,
html[data-theme="dark"] .meta-line .lab,
html[data-theme="dark"] .notes-card p,
html[data-theme="dark"] .info-row .ir-val { color: var(--meta-strong); }
/* amber note cards */
html[data-theme="dark"] .tip-card { background: #2a230f; border-color: #5b4a18; }
html[data-theme="dark"] .tip-card p { color: #f0d990; }
/* food/price tags */
html[data-theme="dark"] .tag-cuisine { background: #3a2a17; color: #f3c490; }
html[data-theme="dark"] .tag-price   { background: #381f30; color: #f1a9cf; }
html[data-theme="dark"] .tag-visited { background: #123626; color: #6ee7b7; }
/* chips / soft surfaces */
html[data-theme="dark"] .chip { background: #1f2740; color: var(--text-muted); }
html[data-theme="dark"] .chip:hover { background: #29335a; color: var(--text); }
html[data-theme="dark"] .chip.danger { background: #3a1d1d; color: #fca5a5; }
html[data-theme="dark"] .chip.is-on { background: #123626; color: #6ee7b7; }
html[data-theme="dark"] .btn-icon { background: #1f2740; color: var(--text-muted); }
html[data-theme="dark"] .day-action-chip { background: var(--bg-card); }
html[data-theme="dark"] .pill { background: var(--bg-card); border-color: #283050; }
html[data-theme="dark"] .topbar { background: rgba(11, 16, 32, .82); }
html[data-theme="dark"] .mode-toggle { background: var(--bg-card); }
/* form fields */
html[data-theme="dark"] .input, html[data-theme="dark"] .textarea { background: var(--input-bg); color: var(--text); }
html[data-theme="dark"] .form-block { background: var(--field-bg); border-color: var(--border); }
/* cloud (auth / trips / share) modals */
html[data-theme="dark"] .cloud-sheet { background: var(--bg-card); color: var(--text); }
html[data-theme="dark"] .cloud-input { background: var(--input-bg); color: var(--text); border-color: var(--border); }
html[data-theme="dark"] .cloud-tabs, html[data-theme="dark"] .cloud-btn.ghost { background: #1f2740; color: var(--text); }
html[data-theme="dark"] .cloud-tab.on { background: var(--bg-card); color: var(--text); }
html[data-theme="dark"] .cloud-x { background: #1f2740; color: var(--text-muted); }
html[data-theme="dark"] .trip-card, html[data-theme="dark"] .jump-item { background: var(--input-bg); border-color: var(--border); }
html[data-theme="dark"] .trip-card.cur, html[data-theme="dark"] .jump-item.cur { background: #17233f; }
html[data-theme="dark"] .cloud-acct { background: var(--bg-card); }

/* ---------- Sheet-style modal (Apple-style bottom sheet on mobile, centered on desktop) ---------- */
.sheet-scrim {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(11, 18, 32, .42);
  display: flex; align-items: flex-end; justify-content: center;
  animation: scrim-in .25s ease both;
  padding: 0;
}
@keyframes scrim-in { from { opacity: 0; } to { opacity: 1; } }
.sheet {
  background: var(--bg-card);
  width: 100%; max-width: 560px;
  border-radius: 22px 22px 0 0;
  box-shadow: 0 -20px 60px -8px rgba(0,0,0,.4);
  padding: 16px 20px calc(28px + env(safe-area-inset-bottom));
  animation: sheet-in .32s cubic-bezier(.32,.72,.34,1) both;
  max-height: 86vh; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
@keyframes sheet-in { from { transform: translateY(40px); opacity: .6; } to { transform: translateY(0); opacity: 1; } }
@media (min-width: 720px) {
  .sheet-scrim { align-items: center; padding: 24px; }
  .sheet { border-radius: 22px; max-height: 78vh; }
}
.sheet-handle {
  width: 38px; height: 5px; border-radius: 999px;
  background: #d6dae3; margin: 4px auto 14px;
}
.sheet-header { display: flex; align-items: center; justify-content: space-between; margin: 0 0 10px; }
.sheet-title { margin: 0; font-size: 18px; font-weight: 800; letter-spacing: -.015em; }
.sheet-close {
  width: 32px; height: 32px; border-radius: 10px;
  background: var(--border-soft); color: var(--text-muted);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 16px; transition: background .15s, transform .1s;
}
.sheet-close:hover { background: #e6eaf2; color: var(--text); }
.sheet-close:active { transform: scale(.94); }

/* ---------- Icon picker grid ---------- */
.icon-picker-group { margin-bottom: 14px; }
.icon-picker-group h5 { margin: 0 0 6px; font-size: 11px; font-weight: 700; color: var(--text-soft); letter-spacing: .12em; text-transform: uppercase; }
.icon-picker-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(48px, 1fr));
  gap: 6px;
}
.icon-cell {
  height: 48px; border-radius: 12px;
  background: var(--bg);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 22px; line-height: 1;
  transition: background .15s, transform .1s, box-shadow .15s;
  border: 1.5px solid transparent;
}
.icon-cell:hover { background: var(--c-soft); }
.icon-cell:active { transform: scale(.94); }
.icon-cell.is-current { border-color: var(--c-accent); background: var(--c-soft); box-shadow: 0 4px 10px -4px rgba(0,0,0,.18); }
.icon-custom-row { margin-top: 10px; display: flex; gap: 8px; align-items: center; }
.icon-custom-row .input { flex: 1; }

/* ---------- Sheet form (Edit day, Edit trip, Edit location) ---------- */
.sheet-form { display: grid; gap: 10px; }
.sheet-form .field { display: grid; gap: 4px; }
.sheet-form .field label { font-size: 11px; font-weight: 700; color: var(--text-soft); letter-spacing: .08em; text-transform: uppercase; padding-left: 2px; }
.sheet-form .icon-pick-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 14px; border-radius: 12px;
  background: var(--bg); border: 1px solid var(--border);
  font-size: 14px; font-weight: 600;
  transition: background .15s, border-color .15s;
}
.sheet-form .icon-pick-btn:hover { background: var(--border-soft); border-color: #d6dae3; }
.sheet-form .icon-pick-btn .icon-emoji-lg { font-size: 24px; }
.sheet-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.sheet-actions .btn-primary, .sheet-actions .btn-secondary { padding: 11px 18px; }
.danger-zone {
  margin-top: 16px; padding-top: 14px;
  border-top: 1px solid var(--border);
  display: flex; flex-wrap: wrap; gap: 8px;
}
.btn-danger {
  padding: 10px 16px; border-radius: var(--r-pill);
  background: #fee2e2; color: #991b1b;
  font-size: 13px; font-weight: 700;
  transition: background .15s, transform .1s;
}
.btn-danger:hover { background: #fecaca; }
.btn-danger:active { transform: scale(.97); }

/* ---------- Trip-identity (replaces fixed Japan 2026 brand text) ---------- */
.brand-text { cursor: default; }
.brand-title.editable { cursor: pointer; transition: color .15s; }
.brand-title.editable:hover { color: var(--c-bg, var(--text)); }
.brand-sub.editable { cursor: pointer; }
.brand-menu-btn {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--bg-card); border: 1px solid var(--border);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 16px; color: var(--text-muted);
  transition: background .15s, transform .1s, box-shadow .15s;
  margin-right: 6px;
}
.brand-menu-btn:hover { background: var(--border-soft); }
.brand-menu-btn:active { transform: scale(.94); }
/* Brand is a button (single trip-edit entry). */
.brand { text-align: left; border-radius: 12px; cursor: default; }
.settings-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--bg-card); border: 1px solid var(--border);
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-muted);
  transition: background .15s, transform .2s ease, box-shadow .15s, color .15s;
}
.settings-btn:hover { background: var(--border-soft); color: var(--text); }
.settings-btn:active { transform: scale(.92) rotate(45deg); }
.topbar-right { display: flex; align-items: center; gap: 8px; flex: 0 0 auto; }

/* ---------- Day actions row (small inline action group in the day overview) ---------- */
.day-actions-row {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-top: 12px;
}
.day-action-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: var(--r-pill);
  background: var(--bg);
  font-size: 12.5px; font-weight: 700; color: var(--text-muted);
  border: 1px solid var(--border);
  transition: background .15s, transform .1s, color .15s, border-color .15s;
}
.day-action-chip:hover { background: var(--c-soft); color: var(--c-accent); border-color: var(--c-accent); }
.day-action-chip:active { transform: scale(.96); }
.day-action-chip.danger:hover { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }

/* ---------- Trip cover banner — themed artwork near the trip name ---------- */
/* width:100% makes this a normal block (capped at 980px, centered on desktop)
   instead of a shrink-to-fit flex item that the banner's nowrap text could grow
   past the viewport — which caused horizontal scrolling on phones. */
.trip-cover-wrap { width: 100%; max-width: 980px; margin: 14px auto 0; padding: 0 16px; }
.cover-banner {
  position: relative; overflow: hidden;
  width: 100%; text-align: left;
  border: 0; border-radius: 20px;
  color: #fff;
  padding: 16px 18px; min-height: 92px;
  display: flex; align-items: center; gap: 14px;
  box-shadow: var(--shadow-md);
}
.cover-banner::after {
  content: ""; position: absolute; inset: 0;
  background: radial-gradient(circle at 0% 0%, rgba(255,255,255,.22), transparent 45%),
              radial-gradient(circle at 100% 120%, rgba(0,0,0,.20), transparent 55%);
  pointer-events: none;
}
.cover-banner .cb-motif { font-size: 44px; line-height: 1; z-index: 1; filter: drop-shadow(0 4px 8px rgba(0,0,0,.22)); }
.cover-banner .cb-motif-ghost {
  position: absolute; right: -16px; bottom: -34px;
  font-size: 150px; line-height: 1; opacity: .16; pointer-events: none;
}
.cover-banner .cb-text { z-index: 1; flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
.cover-banner .cb-title { font-weight: 800; font-size: 18px; letter-spacing: -.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-shadow: 0 1px 2px rgba(0,0,0,.18); }
.cover-banner .cb-sub { font-size: 13px; opacity: .92; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cover-banner .cb-edit {
  z-index: 1; flex: 0 0 auto;
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(255,255,255,.22); backdrop-filter: blur(4px);
  display: inline-flex; align-items: center; justify-content: center; font-size: 14px;
}
@media (min-width: 720px) {
  .trip-cover-wrap { padding: 0 32px; }
  .cover-banner { min-height: 108px; padding: 20px 24px; }
  .cover-banner .cb-title { font-size: 21px; }
}

/* ---------- Theme picker (in Edit Trip sheet) ---------- */
.theme-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(84px, 1fr)); gap: 8px; }
.theme-cell {
  position: relative; height: 58px; border-radius: 14px;
  border: 2px solid transparent; cursor: pointer; overflow: hidden;
  color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  transition: transform .1s ease, box-shadow .15s ease;
}
.theme-cell:active { transform: scale(.96); }
.theme-cell .tc-emoji { font-size: 20px; filter: drop-shadow(0 2px 3px rgba(0,0,0,.25)); }
.theme-cell .tc-label { font-size: 10.5px; font-weight: 700; text-shadow: 0 1px 2px rgba(0,0,0,.3); }
.theme-cell.is-current { border-color: #0b1220; box-shadow: 0 0 0 2px #fff inset, var(--shadow-md); }
.theme-cell.is-current::after { content: "✓"; position: absolute; top: 4px; right: 6px; font-size: 12px; font-weight: 800; text-shadow: 0 1px 2px rgba(0,0,0,.4); }

/* ---------- Feature 1: Day info card ---------- */
.info-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px;
  padding: 12px 16px; margin-bottom: 16px; box-shadow: var(--shadow-sm);
}
.info-card .info-head {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; cursor: pointer; -webkit-user-select: none; user-select: none;
}
.info-card .info-head h4 { margin: 0; font-size: 13px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; color: var(--text-muted); display: inline-flex; align-items: center; gap: 7px; }
.info-card .info-count { font-size: 11px; font-weight: 800; background: var(--border-soft); color: var(--text-muted); border-radius: 999px; padding: 2px 8px; }
.info-card .info-head-right { display: inline-flex; align-items: center; gap: 8px; }
.info-card .info-chevron { font-size: 18px; color: var(--text-soft); transition: transform .3s cubic-bezier(.4,0,.2,1); line-height: 1; }
.info-card.open .info-chevron { transform: rotate(180deg); }
/* Collapsible body — animates real height via grid-template-rows (0fr→1fr),
   which is far more reliable than max-height transitions across engines. */
.info-card .info-body {
  display: grid; grid-template-rows: 0fr; opacity: 0;
  transition: grid-template-rows .32s cubic-bezier(.4,0,.2,1), opacity .25s ease, margin-top .3s ease;
}
.info-card .info-rows { overflow: hidden; min-height: 0; }
.info-card.open .info-body { grid-template-rows: 1fr; opacity: 1; margin-top: 8px; }
.info-row { display: flex; gap: 8px; align-items: baseline; font-size: 14px; padding: 4px 0; line-height: 1.45; }
.info-row .ir-emoji { flex: 0 0 auto; }
.info-row .ir-lab { font-weight: 700; color: var(--text-muted); flex: 0 0 auto; }
.info-row .ir-val { color: var(--meta-strong); min-width: 0; word-break: break-word; }
.btn-info {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: var(--r-pill); font-size: 12.5px; font-weight: 700;
  background: var(--c-soft); color: var(--c-accent); border: 1px solid transparent;
  transition: background .15s, transform .1s;
}
.btn-info:hover { filter: brightness(.97); }
.btn-info:active { transform: scale(.96); }

/* ---------- Feature 2: Section tabs (swipeable) ---------- */
.section-tabs {
  display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none;
  padding: 4px; margin: 0 0 14px; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: var(--r-pill);
  -webkit-overflow-scrolling: touch; position: sticky; top: 0; z-index: 5;
}
.section-tabs::-webkit-scrollbar { display: none; }
.sec-tab {
  flex: 0 0 auto; padding: 9px 15px; border-radius: var(--r-pill);
  font-size: 13.5px; font-weight: 700; color: var(--text-muted); white-space: nowrap;
  display: inline-flex; align-items: center; gap: 6px;
  transition: background .18s, color .18s, transform .1s;
}
.sec-tab:active { transform: scale(.97); }
.sec-tab .st-count { font-size: 11px; font-weight: 800; opacity: .7; }
.sec-tab.is-active { background: var(--ink); color: var(--ink-on); }
.sec-tab.is-active .st-count { opacity: .85; }
.section-panels { position: relative; }
.section-panel { display: none; animation: panelIn .25s ease both; }
.section-panel.is-active { display: block; }
@keyframes panelIn { from { opacity: 0; transform: translateX(6px); } to { opacity: 1; transform: translateX(0); } }
.section-panel .section { margin-top: 0; }
.swipe-hint { text-align: center; font-size: 11.5px; color: var(--text-soft); margin: 2px 0 10px; }
@media (min-width: 720px) { .swipe-hint { display: none; } }

/* ---------- Feature 3: Quick day jump ---------- */
.btn-jump {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 14px; border-radius: var(--r-pill);
  background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.32);
  color: #fff; font-size: 13px; font-weight: 700;
  transition: background .15s, transform .1s;
}
.btn-jump:hover { background: rgba(255,255,255,.28); }
.btn-jump:active { transform: scale(.97); }
.jump-list { display: flex; flex-direction: column; gap: 6px; }
.jump-item {
  display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
  padding: 11px 12px; border-radius: 13px; border: 1px solid var(--border); background: #fff;
  transition: background .15s, transform .1s;
}
.jump-item:hover { background: #f7f9fc; }
.jump-item:active { transform: scale(.99); }
.jump-item.cur { border-color: var(--c-accent); background: var(--c-soft); }
.jump-item .ji-num { width: 34px; height: 34px; border-radius: 10px; background: var(--border-soft); color: var(--text-muted); font-weight: 800; font-size: 14px; display: inline-flex; align-items: center; justify-content: center; flex: 0 0 auto; }
.jump-item.cur .ji-num { background: var(--c-accent); color: #fff; }
.jump-item .ji-main { flex: 1; min-width: 0; }
.jump-item .ji-title { font-weight: 700; font-size: 14.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.jump-item .ji-sub { font-size: 12px; color: var(--text-soft); }
.jump-item .ji-emoji { font-size: 20px; }

/* ---------- Settings sheet ---------- */
.set-group { margin-bottom: 18px; }
.set-label { font-size: 11px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: var(--text-soft); margin: 0 4px 8px; }
.seg { display: flex; gap: 4px; background: var(--border-soft); border-radius: var(--r-pill); padding: 4px; }
.seg-btn {
  flex: 1; text-align: center; padding: 11px 8px; border-radius: var(--r-pill);
  font-size: 13.5px; font-weight: 700; color: var(--text-muted);
  transition: background .18s, color .18s, transform .1s; min-height: 44px;
}
.seg-btn:active { transform: scale(.97); }
.seg-btn.is-on { background: var(--bg-card); color: var(--text); box-shadow: var(--shadow-sm); }
.set-row {
  display: flex; align-items: center; justify-content: space-between; width: 100%;
  padding: 14px 14px; border-radius: 14px; background: var(--bg-card);
  border: 1px solid var(--border); margin-bottom: 8px; min-height: 52px;
  font-size: 15px; font-weight: 600; color: var(--text);
  transition: background .15s, transform .1s;
}
.set-row:hover { background: var(--border-soft); }
.set-row:active { transform: scale(.99); }
.set-row .sr-main { display: inline-flex; align-items: center; gap: 10px; }
.set-row .sr-ic { font-size: 18px; }
.set-row .set-chev { color: var(--text-soft); font-size: 20px; font-weight: 400; }
.set-row.danger { color: #b91c1c; }
html[data-theme="dark"] .set-row.danger { color: #fca5a5; }
.set-about { font-size: 13px; color: var(--text-muted); line-height: 1.5; padding: 2px 4px; }

/* ---------- New section control (now at the top, with icon picker) ---------- */
.sections-top { margin: 0 0 12px; }
.btn-newsection-top {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 15px; border-radius: var(--r-pill); min-height: 40px;
  font-size: 13px; font-weight: 700;
  background: var(--violet); color: #fff;
  box-shadow: 0 6px 16px -8px rgba(124, 92, 255, .6);
  transition: filter .15s, transform .1s;
}
.btn-newsection-top:hover { filter: brightness(1.06); }
.btn-newsection-top:active { transform: scale(.97); }
.new-section-row { display: flex; gap: 8px; align-items: stretch; }
.new-section-row .input { flex: 1; }
.icon-pick-sq {
  flex: 0 0 auto; width: 48px; border-radius: 12px;
  background: var(--input-bg); border: 1px solid var(--border);
  font-size: 22px; display: inline-flex; align-items: center; justify-content: center;
  transition: background .15s, transform .1s, border-color .15s;
}
.icon-pick-sq:hover { background: var(--border-soft); border-color: #c8cdda; }
.icon-pick-sq:active { transform: scale(.95); }

/* ---------- Add Day pill (in days mode) ---------- */
.pill.add-pill-day {
  width: 76px;
  background: transparent;
  border: 1.5px dashed #c8cdda;
  color: var(--text-muted);
}
.pill.add-pill-day .num-label { color: var(--text-muted); }
.pill.add-pill-day .num-big { color: var(--text-muted); font-weight: 700; font-size: 26px; }
.pill.add-pill-day:hover { background: var(--bg-card); border-color: var(--c-accent, #ef4444); color: var(--c-accent, #ef4444); }
.pill.add-pill-day:hover .num-label,
.pill.add-pill-day:hover .num-big { color: var(--c-accent, #ef4444); }

/* =========================================================================
   App shell
   ========================================================================= */
#root { min-height: 100vh; min-height: 100dvh; }
.app { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; }

/* Top bar (sticky, glassy) */
.topbar {
  position: sticky; top: 0; z-index: 30;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 18px;
  padding-top: calc(12px + env(safe-area-inset-top));
  background: rgba(255, 255, 255, 0.82);
  backdrop-filter: saturate(180%) blur(18px);
  -webkit-backdrop-filter: saturate(180%) blur(18px);
  border-bottom: 1px solid var(--border-soft);
}
.brand { display: flex; align-items: center; gap: 12px; min-width: 0; flex: 1 1 auto; overflow: hidden; }
.brand-mark {
  width: 40px; height: 40px; border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #ff7a8a 0%, #ef4444 65%, #b91c1c 100%);
  display: grid; place-items: center; color: white; font-size: 18px;
  box-shadow: 0 6px 16px -4px rgba(239, 68, 68, .55);
  flex: 0 0 auto;
}
.brand-text { display: flex; flex-direction: column; line-height: 1.15; min-width: 0; flex: 1 1 auto; overflow: hidden; }
.brand-title { font-weight: 800; font-size: 17px; color: var(--text); letter-spacing: -.015em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
.brand-sub { font-size: 12px; color: var(--text-soft); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }

.btn-reset {
  font-size: 13px; font-weight: 700; color: var(--text);
  padding: 9px 14px; border-radius: var(--r-pill);
  background: var(--bg-card);
  border: 1px solid var(--border);
  transition: background .15s ease, transform .1s ease, box-shadow .15s ease;
}
.btn-reset:hover { background: #f8fafc; box-shadow: var(--shadow-sm); }
.btn-reset:active { transform: scale(.97); }

/* =========================================================================
   Mode toggle (Days / Locations) — segmented control under the top bar
   ========================================================================= */
.mode-toggle-wrap {
  position: sticky; top: calc(64px + env(safe-area-inset-top)); z-index: 22;
  display: flex; justify-content: center;
  padding: 12px 16px 4px;
  background: var(--bg);
}
.mode-toggle {
  display: inline-flex;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-pill);
  padding: 4px;
  box-shadow: var(--shadow-sm);
  gap: 2px;
}
.mode-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px;
  border-radius: var(--r-pill);
  font-size: 13.5px; font-weight: 700; color: var(--text-muted);
  letter-spacing: .005em;
  transition: background .18s ease, color .18s ease, transform .1s ease;
}
.mode-btn:active { transform: scale(.97); }
.mode-btn.is-active { color: white; }
.mode-btn.is-active.mode-days     { background: linear-gradient(135deg, #ef4444, #f97316); box-shadow: 0 6px 16px -6px rgba(239, 68, 68, .55); }
.mode-btn.is-active.mode-locations { background: linear-gradient(135deg, #0d9488, #14b8a6); box-shadow: 0 6px 16px -6px rgba(13, 148, 136, .55); }

/* When mode toggle is sticky, push the pills-wrap below it accordingly */
.has-toggle .pills-wrap {
  top: calc(64px + 60px + env(safe-area-inset-top));
}

/* =========================================================================
   Day pills (horizontal scroller, primary navigation)
   ========================================================================= */
.pills-wrap {
  position: sticky; top: calc(64px + env(safe-area-inset-top)); z-index: 20;
  background: var(--bg);
  border-bottom: 1px solid var(--border-soft);
}
/* Prev/Next day stepper — above the day tabs, aligned right, always visible. */
.day-nav-bar {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; padding: 10px 16px 0;
}
.day-nav-pos { font-size: 14px; font-weight: 800; color: var(--text); letter-spacing: -.01em; }
.day-nav-pos .dn-of { color: var(--text-soft); font-weight: 600; }
.day-nav-btns { display: flex; gap: 8px; }
.day-nav-btn {
  width: 50px; height: 44px; border-radius: 14px;
  background: var(--bg-card); border: 1px solid var(--border); color: var(--text);
  display: inline-flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-sm);
  transition: background .15s, transform .1s, box-shadow .15s, opacity .15s;
}
.day-nav-btn:hover { background: var(--border-soft); box-shadow: var(--shadow-md); }
.day-nav-btn:active { transform: scale(.95); }
.day-nav-btn:disabled { opacity: .35; pointer-events: none; box-shadow: none; }
@media (max-width: 719px) {
  .day-nav-btn { width: 58px; height: 48px; border-radius: 15px; }
  .day-nav-pos { font-size: 15px; }
}
.pills {
  display: flex; gap: 12px;
  padding: 16px 16px 18px;
  overflow-x: auto;
  scroll-snap-type: x proximity;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.pills::-webkit-scrollbar { display: none; }
.pill {
  flex: 0 0 auto;
  width: 76px;
  height: 92px;
  scroll-snap-align: center;
  background: var(--bg-card);
  border: 1.5px solid #e6e8ef;
  border-radius: 18px;
  padding: 14px 8px 12px;
  text-align: center;
  position: relative;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  gap: 4px;
  transition: transform .18s ease, box-shadow .18s ease, background .18s ease, border-color .18s ease, color .18s ease;
  -webkit-user-select: none; user-select: none;
}
.pill:hover { box-shadow: var(--shadow-sm); border-color: #d6dae3; }
.pill:active { transform: scale(.97); }
.pill .num-label { font-size: 11px; letter-spacing: .04em; font-weight: 600; color: var(--text-muted); text-transform: lowercase; }
.pill .num-big { font-size: 30px; font-weight: 800; line-height: 1; letter-spacing: -.025em; color: var(--text); }
.pill .pill-meta { font-size: 10px; color: var(--text-soft); font-weight: 600; opacity: 0; height: 0; }
.pill .pill-check {
  position: absolute; top: 8px; right: 8px;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--green); color: white;
  font-size: 11px; font-weight: 800;
  display: none; align-items: center; justify-content: center;
  box-shadow: 0 2px 6px rgba(16, 185, 129, .4);
}
.pill.is-done .pill-check { display: flex; }

.pill.is-active {
  background: var(--c-bg);
  border-color: transparent;
  box-shadow: 0 14px 28px -10px rgba(0, 0, 0, .25), 0 6px 12px rgba(0, 0, 0, .08);
  transform: translateY(-1px) scale(1.02);
}
.pill.is-active .num-label { color: rgba(255, 255, 255, .85); }
.pill.is-active .num-big { color: white; }
.pill.is-active .pill-check { background: white; color: var(--c-bg); box-shadow: 0 2px 4px rgba(0,0,0,.15); }

/* Location pills — wider, show name + emoji */
.pill.loc-pill {
  width: auto; min-width: 110px; max-width: 180px;
  height: 92px;
  padding: 12px 16px;
  align-items: center; justify-content: center; gap: 6px;
}
.pill.loc-pill .loc-emoji { font-size: 26px; line-height: 1; }
.pill.loc-pill .loc-name { font-size: 14px; font-weight: 800; color: var(--text); letter-spacing: -.01em; line-height: 1.2; text-align: center; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pill.loc-pill.is-active .loc-name { color: white; }
.pill.loc-pill.add-pill {
  background: transparent;
  border: 1.5px dashed #c8cdda;
  color: var(--text-muted);
}
.pill.loc-pill.add-pill .loc-name { color: var(--text-muted); }
.pill.loc-pill.add-pill:hover { background: var(--bg-card); border-color: var(--c-accent, #0d9488); color: var(--c-accent, #0d9488); }
.pill.loc-pill.add-pill:hover .loc-name { color: var(--c-accent, #0d9488); }

/* Empty-locations hint inside the pills row */
.no-locations-hint {
  display: inline-flex; align-items: center;
  font-size: 13px; color: var(--text-muted); padding: 0 6px;
  font-style: italic;
}

/* =========================================================================
   Day overview card (clean white card, like the reference image)
   ========================================================================= */
.day-view { flex: 1; min-width: 0; }

.overview {
  margin: 18px 16px 0;
  background: var(--bg-card);
  border-radius: 22px;
  padding: 22px 22px 20px;
  box-shadow: var(--shadow-md);
  position: relative;
  overflow: hidden;
  animation: cardIn .35s ease both;
}
.overview::before {
  /* faint city-themed glow in the corner for richness */
  content: "";
  position: absolute; right: -60px; top: -60px;
  width: 220px; height: 220px; border-radius: 50%;
  background: radial-gradient(circle, var(--c-bg) 0%, transparent 65%);
  opacity: .08;
  pointer-events: none;
}
.overview .ov-row {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
}
.overview .ov-label {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 800; letter-spacing: .12em;
  color: var(--c-bg); text-transform: uppercase;
}
.overview .ov-cal {
  width: 44px; height: 44px; border-radius: 14px;
  background: var(--c-soft); color: var(--c-bg);
  display: grid; place-items: center; font-size: 22px;
  flex-shrink: 0;
  transition: transform .15s ease, background .15s ease, box-shadow .15s ease;
  cursor: pointer;
}
.overview button.ov-cal:hover { background: var(--bg-card); box-shadow: var(--shadow-sm); transform: translateY(-1px); }
.overview button.ov-cal:active { transform: scale(.94); }
.overview h2 {
  margin: 12px 0 6px;
  font-size: 26px; line-height: 1.15; font-weight: 800;
  letter-spacing: -.02em; color: var(--text);
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.overview h2 .title-edit {
  width: 30px; height: 30px; border-radius: 10px;
  background: var(--border-soft); color: var(--text-muted);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
  transition: background .15s, color .15s, transform .1s;
}
.overview h2 .title-edit:hover { background: var(--c-soft); color: var(--c-accent); }
.overview h2 .title-edit:active { transform: scale(.94); }
.title-edit-form { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; flex: 1; min-width: 0; }
.title-edit-form .input {
  font-size: 22px; font-weight: 800; padding: 8px 12px;
  border-radius: 12px; border: 2px solid var(--c-bg);
  background: white;
}
@media (min-width: 720px) {
  .title-edit-form .input { font-size: 26px; }
}
.overview .ov-sub {
  margin: 0;
  font-size: 14.5px;
  color: var(--text-muted);
  line-height: 1.5;
}
.overview .ov-actions { margin-top: 16px; display: flex; gap: 8px; flex-wrap: wrap; }
.btn-done {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 11px 18px; border-radius: var(--r-pill);
  background: var(--ink); color: var(--ink-on);
  font-size: 13px; font-weight: 700;
  box-shadow: 0 8px 18px -8px rgba(11, 18, 32, .55);
  transition: background .15s, transform .1s, filter .15s;
}
.btn-done:hover { filter: brightness(1.1); }
.btn-done:active { transform: scale(.97); }
.btn-done.is-done {
  background: linear-gradient(135deg, #10b981, #34d399);
  box-shadow: 0 8px 18px -8px rgba(16, 185, 129, .55);
}

@media (min-width: 720px) {
  .overview { margin: 24px 32px 0; padding: 28px 32px 26px; }
  .overview h2 { font-size: 32px; }
}

/* Day content area */
.content {
  max-width: 980px;
  margin: 0 auto;
  padding: 22px 16px calc(48px + env(safe-area-inset-bottom));
}
@media (min-width: 720px) {
  .content { padding: 28px 32px calc(56px + env(safe-area-inset-bottom)); }
}

/* Notes block (info-only days + weekly notes) */
.notes-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 20px;
  box-shadow: var(--shadow-sm);
}
.notes-card h3 { margin: 0 0 8px; font-size: 16px; font-weight: 700; }
.notes-card p { margin: 0; font-size: 14.5px; color: #2b3344; white-space: pre-line; }
.tip-card {
  background: #fffbeb;
  border: 1px solid #fde68a;
  border-radius: var(--r-md);
  padding: 14px 16px;
  margin-bottom: 18px;
}
.tip-card p { margin: 0; font-size: 14px; color: #6b4f00; white-space: pre-line; }

/* Section block */
.section { margin-top: 30px; }
.section:first-of-type { margin-top: 8px; }
.section-head {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; flex-wrap: wrap; margin-bottom: 14px;
  padding: 0 4px;
}
.section-head h3 {
  margin: 0; font-size: 20px; font-weight: 800; letter-spacing: -.015em;
  display: flex; align-items: center; gap: 10px;
  color: var(--text);
}
.section-head h3 .count {
  font-size: 12px; font-weight: 800;
  padding: 4px 10px; border-radius: var(--r-pill);
  background: var(--border-soft); color: var(--text-muted);
  letter-spacing: .02em;
}
.section.kind-attractions .section-head h3 .icon { color: var(--c-accent); }
.section.kind-restaurants .section-head h3 .icon { color: var(--orange); }
.section.kind-custom      .section-head h3 .icon { color: var(--violet); }

.btn-add {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: var(--r-pill);
  font-size: 13px; font-weight: 700;
  color: white;
  transition: transform .1s, box-shadow .15s, filter .15s;
  box-shadow: 0 6px 14px -6px rgba(0,0,0,.25);
}
.btn-add:hover { filter: brightness(1.05); }
.btn-add:active { transform: scale(.97); }
.btn-add.attr { background: linear-gradient(135deg, var(--c-bg), var(--c-bg-2)); }
.btn-add.rest { background: linear-gradient(135deg, #f97316, #fb923c); }
.btn-add.cust { background: linear-gradient(135deg, var(--violet), var(--violet-2)); }

.section-tools { display: flex; gap: 6px; }
.btn-icon {
  width: 32px; height: 32px; border-radius: 10px;
  background: var(--border-soft); color: var(--text-muted);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 14px; transition: background .15s, color .15s, transform .1s;
}
.btn-icon:hover { background: #e2e6ee; color: var(--text); }
.btn-icon:active { transform: scale(.94); }
.btn-icon.danger:hover { background: #ffe4e4; color: var(--rose); }

/* Cards grid */
.cards { display: grid; grid-template-columns: 1fr; gap: 12px; }
@media (min-width: 720px) { .cards { grid-template-columns: 1fr 1fr; gap: 14px; } }

/* Card */
@keyframes cardIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.card {
  position: relative;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 22px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: box-shadow .2s ease, transform .2s ease, border-color .2s ease;
  display: flex; flex-direction: column;
  animation: cardIn .35s ease both;
}
@media (min-width: 720px) {
  .card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
}
.card.is-visited { opacity: .65; }

/* Hero strip on each card (gradient + city emoji + category badge) */
.card-hero {
  position: relative;
  height: 96px;
  background: linear-gradient(135deg, var(--c-bg) 0%, var(--c-bg-2) 100%);
  display: flex; align-items: center; padding: 0 20px;
  overflow: hidden;
}
.card.kind-restaurant .card-hero { background: linear-gradient(135deg, #fb923c 0%, #fdba74 100%); }
.card.kind-custom .card-hero     { background: linear-gradient(135deg, var(--violet) 0%, var(--violet-2) 100%); }
.card-hero::after {
  content: "";
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 0% 0%, rgba(255,255,255,.22), transparent 50%),
    radial-gradient(circle at 100% 100%, rgba(0,0,0,.18), transparent 50%);
  pointer-events: none;
}
.card-hero .hero-emoji {
  position: relative; z-index: 1;
  font-size: 44px; line-height: 1;
  filter: drop-shadow(0 6px 8px rgba(0,0,0,.18));
}
.card-hero .hero-pattern {
  position: absolute; right: -22px; bottom: -32px;
  font-size: 130px; line-height: 1; opacity: .14;
  pointer-events: none;
}
.card-badge {
  position: absolute; top: 14px; right: 14px; z-index: 2;
  display: inline-flex; align-items: center; gap: 4px;
  padding: 5px 11px; border-radius: var(--r-pill);
  background: rgba(255,255,255,.96);
  color: var(--text);
  font-size: 11px; font-weight: 800; letter-spacing: .12em;
  box-shadow: 0 4px 8px -2px rgba(0,0,0,.12);
}

.card-body { padding: 16px 18px 18px; display: flex; flex-direction: column; gap: 10px; }
.card-name { margin: 0; font-size: 17px; font-weight: 800; letter-spacing: -.01em; line-height: 1.25; }
.card-desc { margin: 4px 0 0; font-size: 14px; color: var(--text-muted); line-height: 1.5; }
.tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
.tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: var(--r-pill);
  font-size: 11.5px; font-weight: 700; letter-spacing: .02em;
}
.tag-cuisine { background: #fff1e6; color: #9a3412; }
.tag-price   { background: #fde7f3; color: #9d174d; }
.tag-visited { background: #d1fae5; color: #065f46; }

.meta-line { font-size: 13.5px; color: #2b3344; line-height: 1.5; margin: 0; }
.meta-line .lab { font-weight: 700; color: var(--text-muted); margin-right: 4px; }

.card-footer {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  flex-wrap: wrap; margin-top: 4px;
}
.card-actions { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  font-size: 12.5px; font-weight: 700;
  padding: 7px 12px; border-radius: var(--r-pill);
  background: var(--border-soft); color: var(--text-muted);
  transition: background .15s, color .15s, transform .1s;
}
.chip:hover { background: #e6eaf2; color: var(--text); }
.chip:active { transform: scale(.96); }
.chip.is-on { background: #d1fae5; color: #065f46; }
.chip.danger { background: #fff0f0; color: #b91c1c; }
.chip.danger:hover { background: #ffe1e1; }

/* Map / Navigate button */
.map-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  min-height: 44px; padding: 0 18px; border-radius: var(--r-pill);
  background: var(--ink);
  color: var(--ink-on); font-size: 13px; font-weight: 700;
  letter-spacing: .01em; white-space: nowrap;
  box-shadow: 0 8px 18px -8px rgba(11, 18, 32, .55), 0 2px 4px rgba(0,0,0,.08);
  transition: transform .1s ease, filter .15s ease, box-shadow .15s ease;
}
.map-btn:hover { filter: brightness(1.18); box-shadow: 0 10px 22px -8px rgba(11, 18, 32, .6); }
.map-btn:active { transform: scale(.96); }
.map-btn .pin { font-size: 14px; }

/* Forms */
.form-block {
  background: var(--field-bg);
  border: 1px dashed var(--border);
  border-radius: var(--r-md);
  padding: 14px;
  margin-bottom: 12px;
  animation: cardIn .25s ease both;
}
.form-block h4 { margin: 0 0 10px; font-size: 13.5px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .08em; }
.form-grid { display: grid; gap: 8px; }
.input, .textarea {
  width: 100%; display: block;
  padding: 10px 12px; border: 1px solid var(--border);
  border-radius: 10px; background: var(--input-bg);
  transition: border-color .15s, box-shadow .15s;
}
.input:focus, .textarea:focus {
  outline: none; border-color: var(--c-accent);
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--c-accent) 18%, transparent);
}
.textarea { min-height: 60px; resize: vertical; line-height: 1.4; }
.form-actions { display: flex; gap: 8px; margin-top: 10px; }
.btn-primary {
  padding: 10px 16px; border-radius: var(--r-pill);
  background: linear-gradient(135deg, #0b1220, #1f2a3d);
  color: white; font-size: 14px; font-weight: 700;
  box-shadow: 0 8px 16px -6px rgba(0,0,0,.4);
  transition: transform .1s, filter .15s;
}
.btn-primary:hover { filter: brightness(1.08); }
.btn-primary:active { transform: scale(.97); }
.btn-secondary {
  padding: 10px 16px; border-radius: var(--r-pill);
  background: var(--border-soft); color: var(--text);
  font-size: 14px; font-weight: 600;
  transition: background .15s;
}
.btn-secondary:hover { background: #e2e6ee; }

/* Rename inline form */
.rename-form { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; flex: 1; min-width: 0; }
.rename-form .input { padding: 6px 10px; }

/* Footer with "+ New section" */
.footer-tools {
  margin-top: 22px; padding-top: 18px;
  border-top: 1px dashed var(--border);
}
.btn-newsection {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 16px; border-radius: var(--r-pill);
  background: linear-gradient(135deg, var(--violet), var(--violet-2));
  color: white; font-size: 13px; font-weight: 700;
  box-shadow: 0 8px 18px -8px rgba(124, 92, 255, .55);
  transition: transform .1s, filter .15s;
}
.btn-newsection:hover { filter: brightness(1.06); }
.btn-newsection:active { transform: scale(.97); }
.footer-help { margin: 10px 2px 0; font-size: 12px; color: var(--text-soft); }

/* Empty state */
.empty {
  font-size: 14px; color: var(--text-soft); font-style: italic;
  padding: 6px 4px;
}

/* Edit form inside card */
.card .form-block { margin-bottom: 0; background: #f9fafe; border: 1px solid var(--border); border-style: solid; }

/* "Add Place" button uses theme-aware color */
.section.kind-attractions .btn-add { /* already set above */ }

/* Better tap states on iOS for pills */
@media (hover: none) {
  .pill { transition-duration: .12s; }
  .pill:hover { transform: none; box-shadow: none; }
  .pill:active { transform: scale(.97); }
}

/* ---------- Read-only (viewer) mode: hide every edit affordance.
   The database (RLS) is the real wall; this is the matching UI. ---------- */
.app.read-only .btn-add,
.app.read-only .btn-newsection,
.app.read-only .title-edit,
.app.read-only .day-actions-row,
.app.read-only .add-pill-day,
.app.read-only .add-pill,
.app.read-only .section-tools,
.app.read-only .btn-done,
.app.read-only .day-action-chip,
.app.read-only .chip[data-action="edit"],
.app.read-only .chip[data-action="edit-r"],
.app.read-only .chip[data-action="edit-c"],
.app.read-only .chip[data-action="edit-loc-a"],
.app.read-only .chip[data-action="edit-loc-r"],
.app.read-only .chip[data-action="edit-loc-c"],
.app.read-only .chip[data-action^="delete"],
.app.read-only .chip[data-action^="toggle-visited"] { pointer-events: none; }
.app.read-only .info-card .btn-icon { display: none; }
/* Viewer can't edit the trip; the brand opens the edit sheet, so disable it. */
.app.read-only .brand,
.app.read-only .ov-cal { pointer-events: none; }

/* =========================================================================
   MOBILE POLISH  —  applies on phones only (≤ 719px). The desktop layout
   (≥ 720px, handled by the existing min-width:720px rules) is left untouched.
   Goals: no horizontal scroll, ≥44px touch targets (Apple HIG), landscape
   safe-area insets, comfortable spacing, smooth momentum scrolling.
   ========================================================================= */
@media (max-width: 719px) {
  /* Never allow a stray element to create sideways scroll. (No overflow:hidden
     on html/body — that would break the sticky top bar / pills / tabs.) */
  #root, .app, .day-view, .content, main { max-width: 100%; }

  /* Respect the notch in landscape — keep content clear of the side insets. */
  .topbar { padding-left: max(16px, env(safe-area-inset-left)); padding-right: max(16px, env(safe-area-inset-right)); }
  .pills, .content, .trip-cover-wrap, .mode-toggle-wrap {
    padding-left: max(16px, env(safe-area-inset-left));
    padding-right: max(16px, env(safe-area-inset-right));
  }

  /* Larger, comfortable touch targets. */
  .chip { min-height: 40px; padding: 9px 14px; font-size: 13px; }
  .map-btn { min-height: 46px; }
  .sec-tab { min-height: 44px; padding: 11px 16px; }
  .day-action-chip { min-height: 42px; padding: 10px 15px; }
  .btn-add { min-height: 42px; padding: 11px 16px; }
  .btn-done { min-height: 46px; }
  .btn-jump, .btn-info { min-height: 42px; }
  .btn-icon { width: 40px; height: 40px; }
  .brand-menu-btn { width: 42px; height: 42px; }
  .btn-reset { min-height: 40px; padding: 9px 14px; }
  .title-edit { width: 36px; height: 36px; }
  .ov-cal { width: 48px; height: 48px; }
  .sheet-close, .cloud-x { width: 40px; height: 40px; }
  .icon-cell { height: 52px; }
  .theme-cell { height: 62px; }
  .jump-item { padding: 13px 14px; }
  .cloud-acct { min-height: 40px; }

  /* Smooth, native-feeling momentum scrolling on the page. */
  body { -webkit-overflow-scrolling: touch; }

  .section-tabs { padding: 5px; gap: 6px; }

  /* Item 3 — more compact place cards (smaller hero strip, tighter body) so
     more content fits, while keeping the modern look + readability. */
  .cards { gap: 10px; }
  .card { border-radius: 18px; }
  .card-hero { height: 56px; padding: 0 16px; }
  .card-hero .hero-emoji { font-size: 30px; }
  .card-hero .hero-pattern { font-size: 92px; bottom: -22px; right: -16px; }
  .card-badge { top: 10px; right: 10px; padding: 4px 9px; font-size: 10px; letter-spacing: .08em; }
  .card-body { padding: 12px 14px 13px; gap: 7px; }
  .card-name { font-size: 15.5px; }
  .card-desc { font-size: 13px; margin-top: 2px; }
  .meta-line { font-size: 13px; }
  .card-footer { margin-top: 2px; }

  /* Item 7 — day-selection pills: a little larger + better balanced for touch
     (same navigation mechanism, just more prominent). */
  .pill { width: 82px; height: 98px; border-radius: 20px; }
  .pill .num-big { font-size: 32px; }
  .pill .num-label { font-size: 11.5px; }
  .pill.is-active { transform: translateY(-1px) scale(1.03); }

  /* Item 4 — more compact day overview card. */
  .overview { margin: 14px 16px 0; padding: 16px 18px 14px; border-radius: 18px; }
  .overview h2 { font-size: 21px; margin: 8px 0 4px; }
  .overview .ov-label { font-size: 11px; }
  .overview .ov-sub { font-size: 13px; }
  .overview .ov-cal { width: 44px; height: 44px; font-size: 20px; }
  .overview .ov-actions { margin-top: 12px; }
  .overview .day-actions-row { margin-top: 8px; }
}

/* Landscape phones: trim the big vertical paddings so more fits above the fold. */
@media (max-width: 926px) and (orientation: landscape) and (max-height: 500px) {
  .hero, .overview { padding-top: 18px; padding-bottom: 16px; }
  .pills { padding-top: 10px; padding-bottom: 12px; }
  .pill { height: 78px; }
}

  /* =========================================================================
     Helpers: id, escape, maps URL
     ========================================================================= */
  function newId() {
    if (typeof crypto !== "undefined" && crypto.randomUUID) return crypto.randomUUID();
    return "id-" + Math.random().toString(36).slice(2) + Date.now().toString(36);
  }

  function esc(s) {
    if (s == null) return "";
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function autoMapsUrl(name, city) {
    var cityName = city === "Fuji" ? "Kawaguchiko" : city === "Flight" ? "Japan" : city;
    return "https://maps.google.com/?q=" + encodeURIComponent(name + " Japan " + cityName);
  }
  function getMapsHref(item, city) {
    var u = (item && item.mapsUrl) ? String(item.mapsUrl).trim() : "";
    if (!u) return autoMapsUrl(item.name, city);
    if (/^https?:\/\//i.test(u)) return u;
    if (/^www\./i.test(u)) return "https://" + u;
    return "https://maps.google.com/?q=" + encodeURIComponent(u);
  }

  /* =========================================================================
     Storage
     =========================================================================
     Backwards compatible. Older stored shapes:
       1) Array<Day>                                              (legacy)
       2) { days, customSections }                                (v2)
     New shape:
       3) { days, customSections, locations, mode, selectedLocationId }
     ========================================================================= */
  var MODE_KEY = "japan-trip-2026:mode";
  var SELECTED_LOCATION_KEY = "japan-trip-2026:selectedLocation";

  var defaultTrip = {
    title: "Japan 2026",
    headline: "Our Japan adventure",
    subtitle: "13 May → 31 May",
    cover: "Tokyo → Nagano → Kyoto → Fuji → Tokyo",
    theme: "sunset"
  };

  // World-wide cover themes (offline-safe gradient artwork + motif). Works for
  // any destination — no Japan-specific assets, no external images required.
  var TRIP_THEMES = [
    { key: "sunset",    label: "Sunset",   emoji: "🌅", g: "linear-gradient(135deg,#ff6a88 0%,#ff9a8b 45%,#ffb86c 100%)" },
    { key: "ocean",     label: "Ocean",    emoji: "🌊", g: "linear-gradient(135deg,#2193b0 0%,#6dd5ed 100%)" },
    { key: "tropical",  label: "Tropical", emoji: "🌴", g: "linear-gradient(135deg,#11998e 0%,#38ef7d 100%)" },
    { key: "mountains", label: "Mountains",emoji: "🏔️", g: "linear-gradient(135deg,#4b6cb7 0%,#182848 100%)" },
    { key: "city",      label: "City",     emoji: "🌆", g: "linear-gradient(135deg,#667eea 0%,#764ba2 100%)" },
    { key: "desert",    label: "Desert",   emoji: "🏜️", g: "linear-gradient(135deg,#f6d365 0%,#fda085 100%)" },
    { key: "forest",    label: "Forest",   emoji: "🌲", g: "linear-gradient(135deg,#0ba360 0%,#3cba92 100%)" },
    { key: "snow",      label: "Snow",     emoji: "❄️", g: "linear-gradient(135deg,#83a4d4 0%,#b6fbff 100%)" },
    { key: "lavender",  label: "Lavender", emoji: "💜", g: "linear-gradient(135deg,#a18cd1 0%,#fbc2eb 100%)" },
    { key: "blossom",   label: "Blossom",  emoji: "🌸", g: "linear-gradient(135deg,#ff9a9e 0%,#fecfef 100%)" },
    { key: "safari",    label: "Safari",   emoji: "🦁", g: "linear-gradient(135deg,#c79081 0%,#dfa579 100%)" },
    { key: "aurora",    label: "Aurora",   emoji: "🌌", g: "linear-gradient(135deg,#5ee7df 0%,#b490ca 100%)" },
    { key: "classic",   label: "Classic",  emoji: "🧳", g: "linear-gradient(135deg,#ff5b6e 0%,#ff8a4c 50%,#ffd166 100%)" }
  ];
  function getTheme(key) {
    for (var i = 0; i < TRIP_THEMES.length; i++) if (TRIP_THEMES[i].key === key) return TRIP_THEMES[i];
    return TRIP_THEMES[0];
  }

  // A fresh, valid planner: generic title + a single Day 1, no custom content.
  // Used by Reset so the user is never left in an empty/broken state.
  function cleanDefaultPlanner() {
    return {
      trip: { title: "My Trip", headline: "", subtitle: "", cover: "", theme: "sunset" },
      days: [{
        id: "day-" + newId().slice(0, 8),
        date: "", weekday: "", city: "", title: "Day 1", description: "",
        done: false, infoOnly: false, notes: "",
        attractions: [], restaurants: [], customItems: {}
      }]
    };
  }

  function loadStored() {
    var fallback = { trip: clone(defaultTrip), days: clone(defaultData), customSections: [], locations: [] };
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return fallback;
      var parsed = JSON.parse(raw);
      // Legacy shape 1: bare array of days
      if (Array.isArray(parsed) && parsed.length > 0) return { trip: clone(defaultTrip), days: parsed, customSections: [], locations: [] };
      // Legacy + new shape: object with days
      if (parsed && Array.isArray(parsed.days) && parsed.days.length > 0) {
        return {
          trip: parsed.trip && typeof parsed.trip === "object" ? Object.assign({}, defaultTrip, parsed.trip) : clone(defaultTrip),
          days: parsed.days,
          customSections: Array.isArray(parsed.customSections) ? parsed.customSections : [],
          locations: Array.isArray(parsed.locations) ? parsed.locations : []
        };
      }
    } catch (e) {}
    return fallback;
  }
  function clone(v) { return JSON.parse(JSON.stringify(v)); }

  /* =========================================================================
     State
     ========================================================================= */
  var state = (function () {
    var s = loadStored();
    var savedMode = localStorage.getItem(MODE_KEY);
    return {
      mode: (savedMode === "locations" ? "locations" : "days"),
      trip: s.trip,
      days: s.days,
      customSections: s.customSections,
      locations: s.locations,
      selectedDayId: localStorage.getItem(SELECTED_DAY_KEY) || s.days[0].id,
      selectedLocationId: localStorage.getItem(SELECTED_LOCATION_KEY) || (s.locations[0] ? s.locations[0].id : null),
      editing: null,            // item id currently in edit mode (within a section)
      adding: null,             // section key for add form: "attractions" | "restaurants" | section id | "__new_section__" | "__new_location__" | "__edit_trip__" | "__edit_day__"
      renamingSection: null,    // section id being renamed
      renamingTitle: null,      // "day" | "location" | "trip-title" | "trip-sub" — inline rename
      iconPicker: null,         // { target: "day"|"section:<id>"|"item:<kind>:<id>"|..., currentIcon: string } or null
      activeSectionTab: 0,      // Feature 2: which section tab (panel) is visible
      dayInfoExpanded: false,   // Item 5: is the Day info block expanded
      newSectionIcon: ""        // chosen icon while creating a new section
    };
  })();

  function persist() {
    try {
      localStorage.setItem(ACTIVE_KEY, JSON.stringify({
        trip: state.trip,
        days: state.days,
        customSections: state.customSections,
        locations: state.locations
      }));
      localStorage.setItem(SELECTED_DAY_KEY, state.selectedDayId || "");
      localStorage.setItem(MODE_KEY, state.mode);
      if (state.selectedLocationId) localStorage.setItem(SELECTED_LOCATION_KEY, state.selectedLocationId);
      else localStorage.removeItem(SELECTED_LOCATION_KEY);
    } catch (e) {}
    // Notify the cloud layer of a local edit (debounced upsert). Skipped while
    // we are applying a remote snapshot, and a no-op in guest mode.
    if (!__applyingRemote && window.TripCloud && window.TripCloud.enabled && window.TripCloud.onLocalChange) {
      window.TripCloud.onLocalChange();
    }
  }

  function getSelectedDay() {
    var i = state.days.findIndex(function (d) { return d.id === state.selectedDayId; });
    return i >= 0 ? state.days[i] : state.days[0];
  }
  function getSelectedDayIndex() {
    var i = state.days.findIndex(function (d) { return d.id === state.selectedDayId; });
    return i >= 0 ? i : 0;
  }
  function getSelectedLocation() {
    if (!state.locations.length) return null;
    var i = state.locations.findIndex(function (l) { return l.id === state.selectedLocationId; });
    return i >= 0 ? state.locations[i] : state.locations[0];
  }

  function updateSelectedDay(mutator) {
    var idx = getSelectedDayIndex();
    var copy = JSON.parse(JSON.stringify(state.days[idx]));
    mutator(copy);
    state.days[idx] = copy;
    persist();
    render();
  }

  function updateSelectedLocation(mutator) {
    var loc = getSelectedLocation();
    if (!loc) return;
    var idx = state.locations.findIndex(function (l) { return l.id === loc.id; });
    var copy = JSON.parse(JSON.stringify(state.locations[idx]));
    mutator(copy);
    state.locations[idx] = copy;
    persist();
    render();
  }

  /* =========================================================================
     Templates / render
     ========================================================================= */
  function html(strings) {
    // Simple tagged-template helper that returns the joined string.
    // (We rely on caller to esc() user-supplied parts.)
    var out = strings[0];
    for (var i = 1; i < arguments.length; i++) out += arguments[i] + strings[i];
    return out;
  }

  // Prev/Next day stepper — large touch targets, pinned top-right above the day tabs.
  function renderDayNav() {
    var idx = getSelectedDayIndex();
    var atFirst = idx <= 0;
    var atLast = idx >= state.days.length - 1;
    return (
      '<div class="day-nav-bar">' +
        '<span class="day-nav-pos">Day ' + (idx + 1) + ' <span class="dn-of">of ' + state.days.length + '</span></span>' +
        '<div class="day-nav-btns">' +
          '<button class="day-nav-btn" data-action="prev-day"' + (atFirst ? " disabled" : "") + ' aria-label="Previous day">' +
            '<svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>' +
          '</button>' +
          '<button class="day-nav-btn" data-action="next-day"' + (atLast ? " disabled" : "") + ' aria-label="Next day">' +
            '<svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>' +
          '</button>' +
        '</div>' +
      '</div>'
    );
  }

  function renderPills() {
    var parts = state.days.map(function (d, i) {
      var icon = d.icon || cityIcon[d.city] || "•";
      var theme = cityClass[d.city] || "";
      var active = d.id === state.selectedDayId;
      var dateShort = d.date ? d.date.replace(/^\w+\s*/, "") : "";
      return (
        '<button class="pill ' + theme + (active ? " is-active" : "") + (d.done ? " is-done" : "") +
        '" data-action="select-day" data-day-id="' + esc(d.id) + '" aria-label="Day ' + (i + 1) + ' — ' + esc(d.date) + ' ' + esc(d.city) + (d.done ? ", done" : "") + '">' +
          '<div class="num-label">Day</div>' +
          '<div class="num-big">' + (i + 1) + '</div>' +
          '<div class="pill-meta"><span class="icon">' + icon + '</span><span>' + esc(dateShort) + '</span></div>' +
          '<span class="pill-check" aria-hidden="true">✓</span>' +
        '</button>'
      );
    }).join("");
    var addPill =
      '<button class="pill add-pill-day" data-action="add-day" aria-label="Add a new day">' +
        '<div class="num-label">add</div>' +
        '<div class="num-big">＋</div>' +
      '</button>';
    return '<div class="pills" id="pills">' + parts + addPill + '</div>';
  }

  function renderHero(day, index) {
    var theme = cityClass[day.city] || "theme-flight";
    var doneOn = day.done ? "is-done" : "";
    var doneLabel = day.done ? "✓ Day done" : "Mark day done";
    var cityLine = day.city === "Flight" ? "In transit" : esc(day.city || "");
    // Caps label: prefer date+city if possible; gracefully degrade
    var monthLabel = day.date ? day.date.replace(/(\w+) (\d+)/, "$1").toUpperCase() : "";
    var dayNum = (day.date && day.date.match(/\d+/)) ? day.date.match(/\d+/)[0] : "";
    var labelParts = [];
    if (monthLabel) labelParts.push(monthLabel);
    if (day.city) labelParts.push(esc((day.city || "").toUpperCase()) + (dayNum ? " " + dayNum : ""));
    var label = labelParts.join(" · ") || "DAY " + (index + 1);
    // Day title is plain text — editing it lives in the "Edit details" dialog.
    var titleBlock = '<h2>' + esc(day.title) + '</h2>';
    var descBlock = day.description
      ? '<p class="ov-sub" style="margin-top:8px;">' + esc(day.description) + '</p>'
      : '';
    var iconNow = day.icon || cityIcon[day.city] || "📅";
    var canMoveUp = index > 0;
    var canMoveDown = index < state.days.length - 1;
    var canDelete = state.days.length > 1;
    return (
      '<section class="overview ' + theme + '">' +
        '<div class="ov-row">' +
          '<div style="flex:1; min-width:0;">' +
            '<div class="ov-label">' + label + '</div>' +
            titleBlock +
            '<p class="ov-sub">Day ' + (index + 1) + ' of ' + state.days.length + ' · ' + esc(day.weekday || "") + (cityLine ? ' · ' + cityLine : "") + '</p>' +
            descBlock +
          '</div>' +
          '<button class="ov-cal" data-action="open-icon-picker" data-target="day" aria-label="Change day icon" title="Change icon">' + iconNow + '</button>' +
        '</div>' +
        '<div class="ov-actions">' +
          '<button class="btn-done ' + doneOn + '" data-action="toggle-done">' + doneLabel + '</button>' +
        '</div>' +
        // Compact quick actions. Duplicate / Move / Delete live in "Edit details".
        '<div class="day-actions-row">' +
          '<button class="day-action-chip" data-action="open-edit-day">⚙️ Edit</button>' +
          '<button class="day-action-chip" data-action="open-day-info">ℹ️ Info</button>' +
          (state.days.length > 1 ? '<button class="day-action-chip" data-action="open-jump">🗓️ Days</button>' : '') +
        '</div>' +
      '</section>'
    );
  }

  /* ---- LOCATIONS-MODE renderers ----
     Locations are a parallel data structure with the same section shape as days
     (attractions, restaurants, customItems keyed by state.customSections id).
     Theme is fixed to .theme-loc (teal/cyan) so it visually distinguishes from days.
  */
  var locEmojiCandidates = ["📍","🌸","🍣","🏞️","🎎","🗾","🍵","🌊","🎏","🍡"];
  function pickLocEmoji(name) {
    var n = (name || "").toLowerCase();
    if (n.indexOf("tokyo") >= 0) return "🗼";
    if (n.indexOf("kyoto") >= 0) return "🏯";
    if (n.indexOf("osaka") >= 0) return "🏙️";
    if (n.indexOf("fuji") >= 0 || n.indexOf("kawaguch") >= 0 || n.indexOf("hakone") >= 0) return "🗻";
    if (n.indexOf("nagano") >= 0 || n.indexOf("hokkaido") >= 0) return "🏔️";
    if (n.indexOf("nara") >= 0) return "🦌";
    if (n.indexOf("hiroshima") >= 0) return "⛩️";
    if (n.indexOf("okinawa") >= 0) return "🏝️";
    return "📍";
  }

  function renderLocationsPills() {
    var parts = state.locations.map(function (loc) {
      var icon = loc.icon || pickLocEmoji(loc.name);
      var active = loc.id === (getSelectedLocation() && getSelectedLocation().id) ? " is-active theme-loc" : "";
      return (
        '<button class="pill loc-pill' + active + '" data-action="select-location" data-loc-id="' + esc(loc.id) + '" aria-label="' + esc(loc.name) + '">' +
          '<span class="loc-emoji" aria-hidden="true">' + icon + '</span>' +
          '<span class="loc-name">' + esc(loc.name) + '</span>' +
        '</button>'
      );
    }).join("");
    var addPill =
      '<button class="pill loc-pill add-pill" data-action="open-new-location" aria-label="Add a new location">' +
        '<span class="loc-emoji" aria-hidden="true">＋</span>' +
        '<span class="loc-name">New location</span>' +
      '</button>';
    var emptyHint = state.locations.length === 0
      ? '<span class="no-locations-hint">No locations yet — tap “New location”.</span>'
      : '';
    return '<div class="pills" id="pills">' + parts + addPill + emptyHint + '</div>';
  }

  function renderLocationOverview(loc) {
    var icon = loc.icon || pickLocEmoji(loc.name);
    var titleBlock = state.renamingTitle === "location"
      ? ('<form class="title-edit-form" data-form="rename-location-title" autocomplete="off">' +
            '<input class="input" name="title" required value="' + esc(loc.name) + '" autofocus>' +
            '<button type="submit" class="btn-primary">Save</button>' +
            '<button type="button" class="btn-secondary" data-action="cancel-rename-title">Cancel</button>' +
         '</form>')
      : ('<h2>' + esc(loc.name) + '<button class="title-edit" data-action="rename-location-title" title="Rename location" aria-label="Rename location">✏️</button></h2>');
    var notesEditing = state.adding === ("notes:" + loc.id);
    var notesBlock = notesEditing
      ? ('<form class="form-block" data-form="location-notes" data-loc-id="' + esc(loc.id) + '" autocomplete="off" style="margin-top:14px;">' +
            '<h4>Notes</h4>' +
            '<textarea class="textarea" name="notes" rows="4" placeholder="Notes about this location…">' + esc(loc.notes || "") + '</textarea>' +
            '<div class="form-actions">' +
              '<button type="submit" class="btn-primary">Save</button>' +
              '<button type="button" class="btn-secondary" data-action="cancel-form">Cancel</button>' +
            '</div>' +
         '</form>')
      : (loc.notes
          ? '<div class="tip-card" style="margin-top:14px;"><p>' + esc(loc.notes) + '</p>' +
              '<div style="margin-top:10px;"><button class="chip" data-action="edit-location-notes" data-loc-id="' + esc(loc.id) + '">✏️ Edit notes</button></div>' +
            '</div>'
          : '<div style="margin-top:14px;"><button class="chip" data-action="edit-location-notes" data-loc-id="' + esc(loc.id) + '">+ Add notes</button></div>'
        );
    return (
      '<section class="overview theme-loc">' +
        '<div class="ov-row">' +
          '<div style="flex:1; min-width:0;">' +
            '<div class="ov-label">LOCATION</div>' +
            titleBlock +
            '<p class="ov-sub">' + esc(icon) + '   ' + state.locations.length + ' location' + (state.locations.length === 1 ? '' : 's') + ' total</p>' +
          '</div>' +
          '<div class="ov-cal" aria-hidden="true">📍</div>' +
        '</div>' +
        '<div class="ov-actions">' +
          '<button class="btn-done" data-action="delete-location" data-loc-id="' + esc(loc.id) + '" data-loc-name="' + esc(loc.name) + '" style="background:#fee2e2; color:#991b1b; box-shadow:none;">🗑️ Delete location</button>' +
        '</div>' +
        notesBlock +
      '</section>'
    );
  }

  function renderLocationAttractions(loc) {
    var items = loc.attractions || [];
    var addOpen = state.adding === "loc-attractions";
    var emptyMsg = (items.length === 0 && !addOpen)
      ? '<p class="empty">No places yet — tap “+ Add Place”.</p>' : '';
    return (
      '<section class="section kind-attractions theme-loc">' +
        '<div class="section-head">' +
          '<h3><span class="icon">🗺️</span> Attractions <span class="count">' + items.length + '</span></h3>' +
          '<button class="btn-add attr" data-action="add-loc-attraction">+ Add Place</button>' +
        '</div>' +
        (addOpen ? renderAttractionEditor({ id: newId() }, true) : '') +

  function renderLocationRestaurants(loc) {
    var items = loc.restaurants || [];
    var addOpen = state.adding === "loc-restaurants";
    var emptyMsg = (items.length === 0 && !addOpen)
      ? '<p class="empty">No restaurants yet — tap “+ Add Restaurant”.</p>' : '';
    return (
      '<section class="section kind-restaurants">' +
        '<div class="section-head">' +
          '<h3><span class="icon">🍱</span> Restaurants <span class="count">' + items.length + '</span></h3>' +
          '<button class="btn-add rest" data-action="add-loc-restaurant">+ Add Restaurant</button>' +
        '</div>' +
        (addOpen ? renderRestaurantEditor({ id: newId() }, true) : '') +
        '<div class="cards">' +
          items.map(function (r) { return renderLocationRestaurantCard(r, loc); }).join("") +
        '</div>' +
        emptyMsg +
      '</section>'
    );
  }

  function renderLocationCustomSection(section, loc) {
    var items = (loc.customItems && loc.customItems[section.id]) || [];
    var addOpen = state.adding === ("loc-custom:" + section.id);
    var emptyMsg = (items.length === 0 && !addOpen)
      ? '<p class="empty">Nothing here yet — tap “+ Add” to add to ' + esc(section.label) + '.</p>' : '';
    return (
      '<section class="section kind-custom">' +
        '<div class="section-head">' +
          '<h3><span class="icon">' + (section.icon || "✨") + '</span> ' + esc(section.label) + ' <span class="count">' + items.length + '</span></h3>' +
          '<div class="section-tools">' +
            '<button class="btn-add cust" data-action="add-loc-custom" data-section-id="' + esc(section.id) + '" data-section-label="' + esc(section.label) + '">+ Add</button>' +
          '</div>' +
        '</div>' +
        (addOpen ? renderGenericEditor({ id: newId() }, true, section.id, section.label) : '') +
        '<div class="cards">' +
          items.map(function (it) { return renderLocationCustomCard(it, loc, section.id, section.label); }).join("") +
        '</div>' +
        emptyMsg +
      '</section>'
    );
  }

  function renderLocationContent(loc) {
    var panels = [
      { label: "Attractions", icon: "🗺️", count: (loc.attractions || []).length, html: renderLocationAttractions(loc) },
      { label: "Restaurants", icon: "🍱", count: (loc.restaurants || []).length, html: renderLocationRestaurants(loc) }
    ];

      panels.push({ label: sec.label, icon: sec.icon || "✨", count: c, html: renderCustomSection(sec, day) });
    });
    return (
      '<div class="content">' +
        noteBlock +
        renderDayInfoCard(day) +
        renderTabbedSections(panels, renderNewSectionForm()) +
      '</div>'
    );
  }

  /* Feature 1 — compact per-day travel info (only filled rows are shown). */
  var DAY_INFO_FIELDS = [
    ["flight", "✈️", "Flight"], ["hotel", "🏨", "Hotel"], ["transport", "🚆", "Transport"],
    ["packing", "🎒", "Packing"], ["reminders", "⏰", "Reminders"]
  ];
  function renderDayInfoCard(day) {
    var info = day.info || {};
    var filled = DAY_INFO_FIELDS.filter(function (f) { return info[f[0]] && String(info[f[0]]).trim(); });
    if (!filled.length) return "";   // empty → the "ℹ️ Info" button in the day header adds it
    var rows = filled.map(function (f) {
      return '<div class="info-row"><span class="ir-emoji">' + f[1] + '</span><span class="ir-lab">' + f[2] + ':</span><span class="ir-val">' + esc(info[f[0]]) + '</span></div>';
    }).join("");
    var open = !!state.dayInfoExpanded;
    // Collapsible: only the header shows by default; tapping it smoothly expands.
    return '<div class="info-card' + (open ? " open" : "") + '">' +
      '<div class="info-head" data-action="toggle-day-info" role="button" tabindex="0" aria-expanded="' + open + '">' +
        '<h4>Day info <span class="info-count">' + filled.length + '</span></h4>' +
        '<span class="info-head-right">' +
          '<button class="btn-icon" data-action="open-day-info" title="Edit day info" aria-label="Edit day info">✏️</button>' +
          '<span class="info-chevron" aria-hidden="true">⌄</span>' +
        '</span>' +
      '</div>' +
      '<div class="info-body"><div class="info-rows">' + rows + '</div></div>' +
    '</div>';
  }

  /* Feature 2 — section tab bar + swipeable one-at-a-time panels.
     topControl (the "+ New section" button/form) sits above the tabs. */
  function renderTabbedSections(panels, topControl) {
    if (!panels.length) return "";
    var active = Math.max(0, Math.min(state.activeSectionTab || 0, panels.length - 1));
    var top = topControl ? '<div class="sections-top">' + topControl + '</div>' : "";
    var tabs = '<div class="section-tabs" id="section-tabs">' + panels.map(function (p, i) {
      return '<button class="sec-tab' + (i === active ? " is-active" : "") + '" data-action="section-tab" data-idx="' + i + '">' +
        '<span class="st-icon" aria-hidden="true">' + p.icon + '</span> ' + esc(p.label) +
        ' <span class="st-count">' + p.count + '</span></button>';
    }).join("") + '</div>';
    var hint = panels.length > 1 ? '<div class="swipe-hint">← swipe between sections →</div>' : "";
    var body = '<div class="section-panels" id="section-panels">' + panels.map(function (p, i) {
      return '<div class="section-panel' + (i === active ? " is-active" : "") + '">' + p.html + '</div>';
    }).join("") + '</div>';
    return top + tabs + hint + body;
  }

  /* =========================================================================
     Sheet modals (icon picker, edit trip, edit day)
     ========================================================================= */
  function renderIconPickerSheet() {
    if (!state.iconPicker) return "";
    var groupsHtml = ICON_PALETTE.map(function (g) {
      return (
        '<div class="icon-picker-group">' +
          '<h5>' + esc(g.label) + '</h5>' +
          '<div class="icon-picker-grid">' +
            g.icons.map(function (ic) {
              var cur = ic === state.iconPicker.currentIcon ? " is-current" : "";
              return '<button class="icon-cell' + cur + '" data-action="pick-icon" data-icon="' + esc(ic) + '" aria-label="Set icon ' + esc(ic) + '">' + ic + '</button>';
            }).join("") +
          '</div>' +
        '</div>'
      );
    }).join("");
    return (
      '<div class="sheet-scrim" data-action="close-sheet">' +
        '<div class="sheet">' +
          '<div class="sheet-handle" aria-hidden="true"></div>' +
          '<div class="sheet-header">' +
            '<h3 class="sheet-title">Choose icon</h3>' +
            '<button class="sheet-close" data-action="close-sheet" aria-label="Close">✕</button>' +
          '</div>' +
          groupsHtml +
          '<form data-form="custom-icon" class="icon-custom-row">' +
            '<input class="input" name="icon" maxlength="6" placeholder="Or paste any emoji (e.g. 🍓)" value="' + esc(state.iconPicker.currentIcon || "") + '" autocomplete="off">' +
            '<button type="submit" class="btn-primary">Use</button>' +
            '<button type="button" class="btn-secondary" data-action="clear-icon">Clear</button>' +
          '</form>' +
        '</div>' +
      '</div>'
    );
  }

  function renderThemeGrid(currentKey) {
    var cur = getTheme(currentKey).key;
    return '<div class="theme-grid">' + TRIP_THEMES.map(function (th) {
      return '<button type="button" class="theme-cell' + (th.key === cur ? " is-current" : "") + '" ' +
        'data-action="set-theme" data-theme="' + th.key + '" style="background:' + th.g + '" aria-label="' + esc(th.label) + ' theme">' +
        '<span class="tc-emoji" aria-hidden="true">' + th.emoji + '</span>' +
        '<span class="tc-label">' + esc(th.label) + '</span>' +
      '</button>';
    }).join("") + '</div>';

  function renderEditTripSheet() {

    return (
      '<div class="sheet-scrim" data-action="close-sheet">' +
        '<div class="sheet">' +
          '<div class="sheet-handle" aria-hidden="true"></div>' +
          '<div class="sheet-header">' +

  function renderEditDaySheet() {

          '<form class="sheet-form" data-form="edit-day" autocomplete="off">' +

            '<div class="field"><label>Icon</label>' +

              '<button type="button" class="day-action-chip" data-action="move-day-down" ' + (idx === state.days.length - 1 ? "disabled" : "") + '>↓ Move down</button>' +
              '<button type="button" class="btn-danger" data-action="delete-day" ' + (state.days.length <= 1 ? "disabled" : "") + '>🗑️ Delete day</button>' +

  function renderItemIconSheet() {
    // Reuses the icon picker; only the icon picker scrim itself shows when state.iconPicker is set.
    return "";
