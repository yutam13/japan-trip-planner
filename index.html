  // Feature 1 — compact day-info editor (all fields optional).
  function renderDayInfoSheet() {
    if (state.adding !== "__day_info__") return "";
    var day = getSelectedDay();
    if (!day) return "";
    var info = day.info || {};
    var fields = DAY_INFO_FIELDS.map(function (f) {
      return '<div class="field"><label>' + f[1] + ' ' + f[2] + '</label>' +
        '<input class="input" name="' + f[0] + '" maxlength="280" value="' + esc(info[f[0]] || "") + '" placeholder="optional"></div>';

    return (
      '<div class="sheet-scrim" data-action="close-sheet">' +
        '<div class="sheet">' +
          '<div class="sheet-handle" aria-hidden="true"></div>' +
          '<div class="sheet-header"><h3 class="sheet-title">Day info</h3>' +
            '<button class="sheet-close" data-action="cancel-form" aria-label="Close">✕</button></div>' +
          '<p style="margin:0 0 10px;font-size:13px;color:var(--text-soft);">Fill in only what you need — flight, hotel, transport, packing, reminders.</p>' +
          '<form class="sheet-form" data-form="day-info" autocomplete="off">' + fields +
            '<div class="sheet-actions">' +
              '<button type="submit" class="btn-primary">Save</button>' +
              '<button type="button" class="btn-secondary" data-action="cancel-form">Cancel</button>' +
            '</div>' +
          '</form>' +
        '</div>' +
      '</div>'
    );

  // Feature 3 — quick day jump.
  function renderJumpSheet() {
    if (state.adding !== "__jump__") return "";
    var items = state.days.map(function (d, i) {
      var icon = d.icon || cityIcon[d.city] || "📍";
      var cur = d.id === state.selectedDayId ? " cur" : "";
      var sub = [d.date, d.city].filter(Boolean).join(" · ");
      return '<button class="jump-item' + cur + '" data-action="jump-day" data-day-id="' + esc(d.id) + '">' +
        '<span class="ji-num">' + (i + 1) + '</span>' +
        '<span class="ji-main"><span class="ji-title">' + esc(d.title || ("Day " + (i + 1))) + '</span>' +
        (sub ? '<span class="ji-sub">' + esc(sub) + '</span>' : "") + '</span>' +
        '<span class="ji-emoji" aria-hidden="true">' + icon + '</span></button>';
    }).join("");
    return (
      '<div class="sheet-scrim" data-action="close-sheet">' +
        '<div class="sheet">' +
          '<div class="sheet-handle" aria-hidden="true"></div>' +
          '<div class="sheet-header"><h3 class="sheet-title">Jump to day</h3>' +
            '<button class="sheet-close" data-action="cancel-form" aria-label="Close">✕</button></div>' +
          '<div class="jump-list">' + items + '</div>' +
        '</div>' +

    );

  /* Item 8 — Settings sheet (Appearance / Trip / About). Light + Dark only. */
  function getThemeMode() {
    try { return localStorage.getItem("trip-theme-mode") === "dark" ? "dark" : "light"; } catch (e) { return "light"; }
  }
  function applyThemeMode(mode) {
    var t = mode === "dark" ? "dark" : "light";
    try { localStorage.setItem("trip-theme-mode", t); } catch (e) {}
    document.documentElement.setAttribute("data-theme", t);
    var meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute("content", t === "dark" ? "#0b1020" : "#ffffff");
  }
  function renderSettingsSheet() {
    if (state.adding !== "__settings__") return "";
    var mode = getThemeMode();
    var seg = [["light", "☀️ Light"], ["dark", "🌙 Dark"]].map(function (m) {
      return '<button class="seg-btn' + (mode === m[0] ? " is-on" : "") + '" data-action="set-theme-mode" data-mode="' + m[0] + '">' + m[1] + '</button>';
    }).join("");
    return (
      '<div class="sheet-scrim" data-action="close-sheet">' +
        '<div class="sheet">' +
          '<div class="sheet-handle" aria-hidden="true"></div>' +
          '<div class="sheet-header"><h3 class="sheet-title">Settings</h3>' +
            '<button class="sheet-close" data-action="cancel-form" aria-label="Close">✕</button></div>' +
          '<div class="set-group"><div class="set-label">Appearance</div>' +
            '<div class="seg">' + seg + '</div>' +
          '</div>' +
          '<div class="set-group"><div class="set-label">Trip</div>' +
            '<button class="set-row" data-action="open-edit-trip"><span class="sr-main"><span class="sr-ic">✏️</span> Edit trip details</span><span class="set-chev">›</span></button>' +
            '<button class="set-row danger" data-action="reset"><span class="sr-main"><span class="sr-ic">♻️</span> Reset to a clean trip</span><span class="set-chev">›</span></button>' +
          '</div>' +
          '<div class="set-group"><div class="set-label">About</div>' +
            '<div class="set-about">Trip Planner — a fast, mobile-first travel planner. Works offline; signs in to sync &amp; share when you want it.</div>' +
          '</div>' +
        '</div>' +
      '</div>'
    );
  }

  function renderModeToggle() {
    var dActive = state.mode === "days" ? " is-active mode-days" : "";
    var lActive = state.mode === "locations" ? " is-active mode-locations" : "";
    return (
      '<div class="mode-toggle-wrap">' +
        '<div class="mode-toggle" role="tablist" aria-label="View mode">' +
          '<button class="mode-btn' + dActive + '" data-action="set-mode" data-mode="days" role="tab" aria-selected="' + (state.mode === "days") + '">📅 Days</button>' +
          '<button class="mode-btn' + lActive + '" data-action="set-mode" data-mode="locations" role="tab" aria-selected="' + (state.mode === "locations") + '">📍 Locations</button>' +
        '</div>' +
      '</div>'
    );
  }

  function renderDaysView() {
    var day = getSelectedDay();
    var index = getSelectedDayIndex();
    return (
      '<div class="pills-wrap">' + renderDayNav() + renderPills() + '</div>' +
      '<main class="day-view">' +
        renderHero(day, index) +
        renderDayContent(day) +
      '</main>'
    );
  }

  function renderCoverBanner(t) {
    var theme = getTheme(t.theme);
    var heading = esc(t.headline || t.title || "Your trip");
    var sub = t.cover ? esc(t.cover) : (t.subtitle ? esc(t.subtitle) : "");
    // Decorative only — trip editing is reached from the top-left brand.
    return (
      '<div class="trip-cover-wrap">' +
        '<div class="cover-banner" style="background:' + theme.g + '">' +
          '<span class="cb-motif" aria-hidden="true">' + theme.emoji + '</span>' +
          '<span class="cb-motif-ghost" aria-hidden="true">' + theme.emoji + '</span>' +
          '<span class="cb-text"><span class="cb-title">' + heading + '</span>' +
            (sub ? '<span class="cb-sub">' + sub + '</span>' : '') + '</span>' +
        '</div>' +
      '</div>'
    );
  }

  function render() {
    var body = state.mode === "locations" ? renderLocationsView() : renderDaysView();
    var t = state.trip || defaultTrip;
    var theme = getTheme(t.theme);
    var coverBand = renderCoverBanner(t);   // trip cover shows in both modes
    var html =
      '<div class="app has-toggle' + (__readOnly ? ' read-only' : '') + '">' +
        '<header class="topbar">' +
          // Top-left brand is display-only; trip editing is via Settings.
          '<div class="brand">' +
            '<div class="brand-mark" aria-hidden="true" style="background:' + theme.g + '">' + theme.emoji + '</div>' +
            '<div class="brand-text">' +
              '<div class="brand-title">' + esc(t.title || "Trip") + '</div>' +
              '<div class="brand-sub">' + esc(t.subtitle || "") + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="topbar-right">' +
            '<button class="settings-btn" data-action="open-settings" title="Settings" aria-label="Settings">' +
              '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>' +
            '</button>' +
          '</div>' +
        '</header>' +
        renderModeToggle() +
        coverBand +
        body +
        renderEditTripSheet() +
        renderEditDaySheet() +
        renderIconPickerSheet() +
        renderDayInfoSheet() +
        renderJumpSheet() +
        renderSettingsSheet() +
      '</div>';

    // Preserve scroll position across the full re-render (no jump to top).
    var prevScroll = window.scrollY || window.pageYOffset || 0;
    document.getElementById("root").innerHTML = html;
    window.scrollTo(0, prevScroll);

    // Keep the active pill in view, but only nudge it when it's actually off-screen
    // (avoids the strip jiggling on every keystroke / state change).
    var activePill = document.querySelector(".pill.is-active");
    if (activePill) {
      var pr = activePill.getBoundingClientRect();
      if (pr.left < 4 || pr.right > window.innerWidth - 4) {
        activePill.scrollIntoView({ block: "nearest", inline: "center" });
      }
    }
  }

  /* =========================================================================
     Event handling (delegated)
     ========================================================================= */
  document.addEventListener("click", function (e) {
    var t = e.target.closest("[data-action]");
    if (!t) return;
    var action = t.dataset.action;

    if (action === "toggle-day-info") {
      // Toggle directly on the live element so the CSS height transition animates
      // (a full re-render would snap straight to the final state). State is kept
      // so later renders preserve the open/closed choice.
      state.dayInfoExpanded = !state.dayInfoExpanded;
      var card = document.querySelector(".info-card");
      if (card) {
        card.classList.toggle("open", state.dayInfoExpanded);
        var head = card.querySelector(".info-head");
        if (head) head.setAttribute("aria-expanded", state.dayInfoExpanded);
      }
      return;
    }

    if (action === "select-day") {
      state.selectedDayId = t.dataset.dayId;
      state.adding = null; state.editing = null; state.renamingSection = null;
      state.activeSectionTab = 0;   // reset section tab when changing day
      state.dayInfoExpanded = false; // collapse day info on day change
      persist();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
      return;
    }

    /* Prev / Next day stepper */
    if (action === "prev-day" || action === "next-day") {
      var ci = getSelectedDayIndex();
      var ni = action === "prev-day" ? ci - 1 : ci + 1;
      if (ni < 0 || ni >= state.days.length) return;
      state.selectedDayId = state.days[ni].id;
      state.adding = null; state.editing = null; state.renamingSection = null;
      state.activeSectionTab = 0; state.dayInfoExpanded = false;
      persist();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
      return;
    }

    /* Feature 2 — section tabs */
    if (action === "section-tab") {
      state.activeSectionTab = parseInt(t.dataset.idx, 10) || 0;
      render();
      return;
    }

    /* Feature 1 — day info */
    if (action === "open-day-info") { state.adding = "__day_info__"; state.editing = null; state.renamingTitle = null; state.iconPicker = null; render(); return; }

    /* Feature 3 — quick day jump */
    if (action === "open-jump") { state.adding = "__jump__"; state.editing = null; render(); return; }
    if (action === "jump-day") {
      state.selectedDayId = t.dataset.dayId;
      state.adding = null; state.editing = null; state.activeSectionTab = 0; state.dayInfoExpanded = false;
      persist(); render();
      window.scrollTo({ top: 0, behavior: "smooth" });
      return;
    }

    if (action === "reset") {
      if (confirm("Reset this planner to a clean trip? This removes all days, places, custom sections and locations, and starts you with a fresh trip and Day 1.")) {
        var fresh = cleanDefaultPlanner();
        state.trip = fresh.trip;
        state.days = fresh.days;
        state.customSections = [];
        state.locations = [];
        state.mode = "days";
        state.selectedDayId = state.days[0].id;
        state.selectedLocationId = null;
        state.adding = null; state.editing = null; state.renamingSection = null; state.renamingTitle = null; state.iconPicker = null;
        persist(); render();
      }
      return;
    }

    if (action === "toggle-done") {
      updateSelectedDay(function (d) { d.done = !d.done; });
      return;
    }

    /* Attractions */
    if (action === "add-attraction") { state.adding = "attractions"; state.editing = null; render(); return; }
    if (action === "edit") { state.editing = t.dataset.id; state.adding = null; render(); return; }
    if (action === "toggle-visited") {
      var id = t.dataset.id;

      var prev = __applyingRemote;
      __applyingRemote = opts.silent ? true : prev;
      try {
        if (c && typeof c === "object") {
          state.trip = c.trip ? Object.assign({}, defaultTrip, c.trip) : clone(defaultTrip);
          var rawDays = (Array.isArray(c.days) && c.days.length) ? c.days : clone(defaultData);
          // Normalize: ensure every day has arrays the renderers depend on.
          state.days = rawDays.map(function (d) {
            return Object.assign({ attractions: [], restaurants: [], customItems: {} }, d,
              { attractions: Array.isArray(d.attractions) ? d.attractions : [],
                restaurants: Array.isArray(d.restaurants) ? d.restaurants : [],
                customItems: (d.customItems && typeof d.customItems === "object") ? d.customItems : {} });
          });
          state.customSections = Array.isArray(c.customSections) ? c.customSections : [];
          state.locations = Array.isArray(c.locations) ? c.locations : [];
          if (!state.days.some(function (d) { return d.id === state.selectedDayId; })) state.selectedDayId = state.days[0].id;
          state.selectedLocationId = state.locations.some(function (l) { return l.id === state.selectedLocationId; })
            ? state.selectedLocationId : (state.locations[0] ? state.locations[0].id : null);
          state.editing = null; state.adding = null; state.renamingSection = null; state.renamingTitle = null; state.iconPicker = null;
          state.activeSectionTab = 0;
        }
        persist();
        render();
      } finally { __applyingRemote = prev; }
    },
    // True while any edit form / sheet / picker is open (sync edit-guard).
    isEditing: function () {
      return !!(state.adding || state.editing || state.iconPicker || state.renamingTitle || state.renamingSection);
    },
    render: function () { render(); },
    setReadOnly: function (v) { __readOnly = !!v; render(); },
    setActiveKey: function (k) { ACTIVE_KEY = k || STORAGE_KEY; },
    reloadLocal: function () {
      var s = loadStored();
      var prev = __applyingRemote; __applyingRemote = true;
      try {
        state.trip = s.trip; state.days = s.days; state.customSections = s.customSections; state.locations = s.locations;
        if (!state.days.some(function (d) { return d.id === state.selectedDayId; })) state.selectedDayId = state.days[0].id;
        render();
      } finally { __applyingRemote = prev; }
    },
    newId: function () { return newId(); },
    // A fresh, minimal valid planner document for a brand-new cloud trip.
    blankContent: function () {
      var did = "day-" + newId().slice(0, 8);
      return {
        trip: { title: "New trip", headline: "", subtitle: "", cover: "" },
        days: [{ id: did, date: "", weekday: "", city: "", title: "Day 1", description: "", done: false, infoOnly: false, notes: "", attractions: [], restaurants: [], customItems: {} }],
        customSections: [], locations: []
      };
    }
  };

  render();
})();
</script>

<!-- Cloud layer (optional). Loads after the app so window.TripApp exists.
     If config.js has no keys, cloud.js no-ops and the app stays guest-only.
     `defer` preserves order: config → supabase SDK → cloud. -->
<script defer src="config.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script defer src="cloud.js"></script>
